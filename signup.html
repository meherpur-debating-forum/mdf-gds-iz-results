<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffd700; --bg-dark: #121212; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; overflow: hidden; }
        
        /* এন্ট্রি স্টেজ ডিজাইন */
        .entry-stage { position: fixed; inset: 0; z-index: 100; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; transition: all 1s ease; }
        .hidden-stage { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .login-card { background: #1e1e1e; transform: translateY(30px); opacity: 0; transition: all 0.8s ease 0.4s; }
        .login-card.show { transform: translateY(0); opacity: 1; }

        .otp-input {
            width: 8.5%; max-width: 40px; height: 50px; text-align: center; background: #252525;
            border: 1px solid #444; border-radius: 6px; font-size: 1.2rem; font-weight: bold;
            color: var(--accent); outline: none; -moz-appearance: textfield;
            transition: all 0.3s;
        }
        .otp-input::-webkit-outer-spin-button, .otp-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .otp-input:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(255, 215, 0, 0.3); transform: scale(1.05); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <!-- মিউজিক প্লেয়ার -->
    <audio id="bgMusic" loop>
        <source src="bg.mp3" type="audio/mpeg">
    </audio>

    <!-- এন্ট্রি গেটওয়ে -->
    <div id="entryStage" class="entry-stage">
        <div class="text-center">
            <div class="mb-10">
                <div class="w-16 h-1 border-t-2 border-amber-500 mx-auto mb-4 animate-pulse"></div>
                <h3 class="text-amber-500 font-bold tracking-[0.4em] text-[10px] uppercase">Results Portal 2026</h3>
            </div>
            <button onclick="unlockLogin()" class="bg-amber-500 text-slate-900 px-10 py-4 rounded-2xl font-black text-lg shadow-[0_15px_40px_rgba(251,191,36,0.2)] hover:scale-105 transition active:scale-95">
                রেজাল্ট পোর্টাল খুলুন 🔓
            </button>
        </div>
    </div>

    <!-- মেইন লগইন কার্ড -->
    <div id="loginCard" class="login-card p-6 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-lg border border-gray-800">
        <div class="text-center mb-8">
            <h2 class="text-2xl md:text-3xl font-bold text-[#ffd700]">ফলাফল যাচাই</h2>
            <p class="text-gray-400 mt-2 text-sm md:text-base">আপনার ১১ ডিজিটের মোবাইল নম্বরটি লিখুন</p>
        </div>
        
        <div id="otp-container" class="flex justify-center gap-1 md:gap-2 mb-8">
            <input class="otp-input" type="number" oninput="moveNext(this, 0)">
            <input class="otp-input" type="number" oninput="moveNext(this, 1)">
            <input class="otp-input" type="number" oninput="moveNext(this, 2)">
            <input class="otp-input" type="number" oninput="moveNext(this, 3)">
            <input class="otp-input" type="number" oninput="moveNext(this, 4)">
            <input class="otp-input" type="number" oninput="moveNext(this, 5)">
            <input class="otp-input" type="number" oninput="moveNext(this, 6)">
            <input class="otp-input" type="number" oninput="moveNext(this, 7)">
            <input class="otp-input" type="number" oninput="moveNext(this, 8)">
            <input class="otp-input" type="number" oninput="moveNext(this, 9)">
            <input class="otp-input" type="number" oninput="moveNext(this, 10)">
        </div>

        <div id="loader" class="hidden text-center mb-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-[#ffd700]"></div>
            <p class="text-xs text-amber-500/60 mt-2 font-medium">সার্ভার যাচাই করা হচ্ছে...</p>
        </div>
        
        <p id="error" class="text-red-400 text-sm hidden text-center font-semibold bg-red-900/10 p-4 rounded-xl border border-red-900/40 animate-shake">নম্বরটি আমাদের তালিকায় পাওয়া যায়নি। আবার চেষ্টা করুন।</p>
        
        <div class="text-center mt-10">
            <a href="index.html" class="text-gray-500 hover:text-white text-xs uppercase tracking-widest font-bold transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                হোম পেজে ফিরে যান
            </a>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const bgMusic = document.getElementById('bgMusic');
        const inputs = document.querySelectorAll('.otp-input');

        // ১. মিউজিক সিঙ্ক লজিক
        window.addEventListener('load', () => {
            const savedTime = localStorage.getItem('musicCurrentTime');
            if (savedTime) {
                bgMusic.currentTime = parseFloat(savedTime);
            }
        });

        // প্রতি সেকেন্ডে সময় সেভ করা
        bgMusic.ontimeupdate = () => {
            localStorage.setItem('musicCurrentTime', bgMusic.currentTime);
        };

        // ২. পোর্টাল ওপেনিং
        function unlockLogin() {
            bgMusic.play().catch(e => console.log("Playback error"));
            document.getElementById('entryStage').classList.add('hidden-stage');
            document.getElementById('loginCard').classList.add('show');
            document.body.style.overflow = "auto";
            inputs[0].focus();
        }

        function moveNext(current, index) {
            if (current.value.length > 1) current.value = current.value.slice(0, 1);
            if (current.value !== "" && index < 10) inputs[index + 1].focus();
            checkFull();
        }

        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && input.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkFull() {
            let phone = "";
            inputs.forEach(i => phone += i.value);
            if (phone.length === 11) {
                document.getElementById('loader').classList.remove('hidden');
                document.getElementById('error').classList.add('hidden');
                
                setTimeout(() => {
                    const exists = allParticipants.some(p => p.phone === phone);
                    if (exists) { 
                        // যাওয়ার আগে বর্তমান মিউজিক পজিশন নিশ্চিতভাবে সেভ করা
                        localStorage.setItem('musicCurrentTime', bgMusic.currentTime);
                        localStorage.setItem('userPhone', phone); 
                        window.location.href = 'results.html'; 
                    }
                    else { 
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('error').classList.remove('hidden');
                        // ইনপুট ক্লিয়ার করা (অপশনাল)
                        inputs.forEach(i => i.value = "");
                        inputs[0].focus();
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
