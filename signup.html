<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>প্রবেশদ্বার | ইনকিলাব জিন্দাবাদ ২০২৬</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #fbbf24;
            --bg-deep: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(251, 191, 36, 0.2);
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .gateway-stage {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1.2s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .gateway-stage.active-hide {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(40px);
            opacity: 0;
            display: none;
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .premium-card.active-show {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }

        .otp-wrapper {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 2rem 0;
        }

        .digit-box {
            width: 32px;
            height: 45px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            outline: none;
            transition: all 0.3s ease;
        }

        .digit-box:focus {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            transform: scale(1.05);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .error-shake { animation: shake 0.3s ease-in-out; }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <audio id="bgMusic" loop preload="auto"><source src="bg.mp3" type="audio/mpeg"></audio>

    <!-- ১. গেটওয়ে স্ক্রিন -->
    <div id="gateway" class="gateway-stage">
        <div class="relative mb-12">
            <div class="w-24 h-24 rounded-full border-2 border-amber-500/30 flex items-center justify-center p-2 mb-6">
                <div class="w-full h-full rounded-full border border-amber-500 flex items-center justify-center animate-pulse">
                    <span class="text-amber-500 text-3xl font-black">IZ</span>
                </div>
            </div>
            <div class="scan-line"></div>
        </div>

        <div class="text-center space-y-4 px-6">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tighter text-white">ইনকিলাব জিন্দাবাদ <span class="text-amber-500">২০২৬</span></h1>
            <p class="text-slate-400 font-medium text-xs tracking-[0.2em] uppercase">National Talent Recognition Portal</p>
        </div>

        <button onclick="startExperience()" class="mt-16 group relative">
            <div class="absolute -inset-1 bg-gradient-to-r from-amber-600 to-yellow-400 rounded-2xl blur opacity-25 group-hover:opacity-100 transition duration-1000"></div>
            <div class="relative px-12 py-5 bg-amber-500 rounded-2xl flex items-center transition active:scale-95">
                <span class="text-slate-900 font-black text-xl tracking-tight">পোর্টাল খুলুন 🔓</span>
            </div>
        </button>
        <div class="absolute bottom-10 text-slate-600 text-[10px] uppercase tracking-[0.3em]">Secure Access Point v2.4</div>
    </div>

    <!-- ২. মেইন কন্টেন্ট এরিয়া -->
    <div id="mainContainer" class="premium-card">
        <div class="text-center space-y-3 mb-10">
            <h2 class="text-3xl font-bold text-white tracking-tight">পরিচয় যাচাই</h2>
            <p class="text-slate-400 text-sm">রেজাল্ট দেখতে ১১ ডিজিটের নম্বরটি দিন</p>
        </div>

        <div id="inputGroup" class="otp-wrapper">
            <!-- ১১টি ইনপুট বক্স -->
            <script>
                for(let i=0; i<11; i++) {
                    document.write(`<input class="digit-box" type="tel" maxlength="1" oninput="handleInput(this, ${i})" onkeydown="handleKey(event, ${i})" autocomplete="off">`);
                }
            </script>
        </div>

        <div id="loader" class="hidden py-4 text-center">
            <div class="flex items-center justify-center gap-2">
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
            </div>
        </div>

        <div id="errorMsg" class="hidden mb-6">
            <div class="bg-red-500/10 border border-red-500/30 p-4 rounded-2xl text-center">
                <p class="text-red-400 text-xs font-semibold">এই নম্বরটি আমাদের তালিকায় নেই।</p>
            </div>
        </div>

        <div class="mt-12 pt-8 border-t border-slate-800 flex items-center justify-between">
            <a href="index.html" class="text-slate-500 hover:text-white transition text-xs font-bold uppercase tracking-widest flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg> হোম
            </a>
            <span class="text-[10px] text-slate-600 uppercase tracking-tighter">System Online</span>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const gateway = document.getElementById('gateway');
        const mainCard = document.getElementById('mainContainer');
        const bgMusic = document.getElementById('bgMusic');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');

        function startExperience() {
            bgMusic.play().catch(() => {});
            gateway.classList.add('active-hide');
            setTimeout(() => {
                gateway.style.display = 'none';
                mainCard.classList.add('active-show');
                document.querySelectorAll('.digit-box')[0].focus();
            }, 800);
        }

        function handleInput(el, index) {
            el.value = el.value.replace(/[^0-9]/g, '');
            const inputs = document.querySelectorAll('.digit-box');
            if (el.value.length === 1 && index < 10) {
                inputs[index + 1].focus();
            }
            checkSequence();
        }

        function handleKey(e, index) {
            const inputs = document.querySelectorAll('.digit-box');
            if (e.key === "Backspace" && e.target.value === "" && index > 0) {
                inputs[index - 1].focus();
            }
        }

        function checkSequence() {
            const inputs = document.querySelectorAll('.digit-box');
            let combinedNumber = "";
            inputs.forEach(input => combinedNumber += input.value);

            if (combinedNumber.length === 11) {
                loader.classList.remove('hidden');
                errorMsg.classList.add('hidden');
                
                setTimeout(() => {
                    const found = typeof allParticipants !== 'undefined' && 
                                  allParticipants.some(p => String(p.phone).trim() === combinedNumber);

                    if (found) {
                        localStorage.setItem('userPhone', combinedNumber);
                        mainCard.style.borderColor = "#10b981";
                        setTimeout(() => window.location.href = 'result.html', 500);
                    } else {
                        loader.classList.add('hidden');
                        errorMsg.classList.remove('hidden');
                        mainCard.classList.add('error-shake');
                        setTimeout(() => mainCard.classList.remove('error-shake'), 500);
                        inputs.forEach(i => i.value = "");
                        inputs[0].focus();
                    }
                }, 800);
            }
        }

        window.onload = () => {
            const savedTime = localStorage.getItem('musicTime');
            if (savedTime) bgMusic.currentTime = parseFloat(savedTime);
        };

        bgMusic.ontimeupdate = () => {
            localStorage.setItem('musicTime', bgMusic.currentTime);
        };
    </script>
</body>
</html>
