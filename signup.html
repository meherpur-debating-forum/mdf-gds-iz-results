<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>লগইন</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #fbbf24;
            --bg-deep: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(251, 191, 36, 0.2);
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
            padding: 3rem 1.5rem;
            width: 95%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .otp-wrapper {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 4px;
            margin: 2.5rem 0;
            width: 100%;
        }

        .digit-box {
            width: calc(100% / 11 - 4px);
            max-width: 35px;
            height: 50px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            outline: none;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        .digit-box:focus {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
            transform: scale(1.05);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            60% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.3s ease-in-out; }

        @media (max-width: 375px) {
            .digit-box { height: 42px; font-size: 1rem; }
            .otp-wrapper { gap: 2px; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div id="mainContainer" class="premium-card">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center mx-auto mb-4">
                <span class="text-amber-500 text-xl font-black">IZ</span>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">পরিচয় যাচাই</h2>
            <p class="text-slate-400 text-xs mt-2">ফলাফল দেখতে আপনার ১১ ডিজিটের নম্বরটি দিন</p>
        </div>

        <div id="inputGroup" class="otp-wrapper">
            <!-- Generate 11 input boxes -->
            <script>
                for(let i=0; i<11; i++) {
                    document.write(`<input class="digit-box" type="tel" maxlength="1" oninput="handleInput(this, ${i})" onkeydown="handleKey(event, ${i})" autocomplete="off" placeholder="•">`);
                }
            </script>
        </div>

        <!-- Loader UI -->
        <div id="loader" class="hidden py-4 text-center">
            <div class="flex items-center justify-center gap-2">
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
            </div>
            <p class="text-[10px] text-amber-500/60 uppercase tracking-widest mt-2">Verifying Database...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="hidden mb-6">
            <div class="bg-red-500/10 border border-red-500/30 p-4 rounded-2xl text-center">
                <p class="text-red-400 text-xs font-medium">দুঃখিত! এই নম্বরটি আমাদের তালিকায় নেই।</p>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-800/50 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                <span class="text-[9px] text-slate-500 uppercase tracking-wider font-bold">System Online</span>
            </div>
            <span class="text-[9px] text-slate-700 uppercase tracking-widest">Inquilab 2026</span>
        </div>
    </div>

    <!-- Data Import -->
    <script src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/data.js"></script>
    
    <script>
        const mainCard = document.getElementById('mainContainer');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');

        // Focus on first input on load
        window.onload = () => {
            const firstInput = document.querySelectorAll('.digit-box')[0];
            if(firstInput) firstInput.focus();
        };

        function handleInput(el, index) {
            el.value = el.value.replace(/[^0-9]/g, '');
            const inputs = document.querySelectorAll('.digit-box');
            
            if (el.value.length === 1 && index < 10) {
                inputs[index + 1].focus();
            }
            
            checkAndSubmit();
        }

        function handleKey(e, index) {
            const inputs = document.querySelectorAll('.digit-box');
            if (e.key === "Backspace" && e.target.value === "" && index > 0) {
                inputs[index - 1].focus();
            }
        }

        function checkAndSubmit() {
            const inputs = document.querySelectorAll('.digit-box');
            let combinedNumber = "";
            inputs.forEach(input => combinedNumber += input.value);

            if (combinedNumber.length === 11) {
                loader.classList.remove('hidden');
                errorMsg.classList.add('hidden');
                
                // Simulate processing delay
                setTimeout(() => {
                    const found = typeof allParticipants !== 'undefined' && 
                                  allParticipants.some(p => String(p.phone).trim() === combinedNumber);

                    if (found) {
                        localStorage.setItem('userPhone', combinedNumber);
                        mainCard.style.borderColor = "#10b981";
                        // Success Redirect
                        setTimeout(() => window.location.href = 'result.html', 400);
                    } else {
                        loader.classList.add('hidden');
                        errorMsg.classList.remove('hidden');
                        mainCard.classList.add('error-shake');
                        
                        if (navigator.vibrate) navigator.vibrate(200);
                        
                        setTimeout(() => {
                            mainCard.classList.remove('error-shake');
                            inputs.forEach(i => i.value = "");
                            inputs[0].focus();
                        }, 500);
                    }
                }, 800);
            }
        }
    </script>
</body>
</html>
