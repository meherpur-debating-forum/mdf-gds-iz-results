<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS RESTRICTED | INQILAB 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #0f0; /* Classic Hacker Green */
            font-family: 'Fira Code', 'Hind Siliguri', monospace;
            overflow: hidden;
            margin: 0;
        }

        /* Matrix Rain Background Effect */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        .terminal-box {
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #0f0;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <canvas id="matrix"></canvas>

    <div class="terminal-box rounded-lg">
        <div class="flex gap-2 mb-4 border-b border-green-900 pb-2">
            <div class="w-3 h-3 rounded-full bg-red-600"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-600"></div>
            <div class="w-3 h-3 rounded-full bg-green-600"></div>
            <span class="text-xs text-green-700 ml-2">SYSTEM_STATUS: ENCRYPTED</span>
        </div>
            
            <div class="py-6">
                <h1 class="text-2xl md:text-3xl font-bold glitch uppercase tracking-tighter">
                    রেজাল্ট দেওয়া হবে
                    ১লা এপ্রিল ২০২৬ | ১২:০০
                </h1>
                <p class="mt-4 text-lg text-white">
                    আপনার ধৈর্যের জন্য ধন্যবাদ <span class="cursor"></span>
                </p>
            </div>

            <div class="w-full bg-green-900/30 h-2 rounded-full overflow-hidden">
                <div class="bg-green-500 h-full w-2/3 animate-[pulse_2s_infinite]"></div>
            </div>
            
            <p class="text-[10px] text-green-800 text-center mt-4 uppercase">
                Secure Connection Established • MDF Server Node 01
            </p>
        </div>
    </div>

    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
