<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <!-- Social Preview / Thumbnail Support -->
    <link rel="icon" type="image/jpeg" href="20260326_124926.jpg">
    <script>
        // চূড়ান্ত পাবলিশ সময়: ১লা এপ্রিল, ২০২৬ রাত ০৮:০০:০০ (২০:০০)
        const publishTime = new Date("2026-04-01T20:00:00").getTime();

        function checkRedirect() {
            const now = new Date().getTime();

            if (now < publishTime) {
                // রাত ৮টার আগে পর্যন্ত কাউন্টডাউন পেজে থাকবে
                window.location.replace("waitindex.html");
            } else {
                // রাত ৮টা বাজার সাথে সাথে সরাসরি রেজাল্ট পেজে চলে যাবে
                window.location.replace("mainindex.html");
            }
        }

        // পেজ লোড হওয়ার সাথে সাথে চেক করবে
        window.onload = checkRedirect;
    </script>
    <style>
        body {
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #00ff41;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
        }
        .site-thumbnail {
            margin-bottom: 30px;
        }
        .site-thumbnail img {
            width: 120px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            border: 1px solid rgba(0, 255, 65, 0.5);
        }
        .loading-text {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
        }
    </style>
</head>
<body>

    <div class="site-thumbnail">
        <img src="20260326_124926.jpg" alt="Inquilab 2026">
    </div>

    <div class="loading-text">Establishing Secure Connection...</div>

</body>
</html>
