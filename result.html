<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আপনার ফলাফল | ইনকিলাব জিন্দাবাদ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: #f8fafc; }
        
        /* ডার্ক মোড কার্ড স্টাইল */
        .result-card-main {
            background: #1e293b;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ডাউনলোড মোড (বডি হোয়াইট থাকবে ডাউনলোড এর সময়) */
        .download-active {
            background: #ffffff !important;
            color: #000000 !important;
            padding: 40px !important;
            width: 800px !important;
            border: 10px solid #f1f5f9 !important;
            border-radius: 0px !important;
        }
        
        .download-active .label-text { color: #475569 !important; }
        .download-active .val-text { color: #000000 !important; font-weight: 700; }
        .download-active .header-title { color: #1e3a8a !important; }
        .download-active .pos-box { background: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: #1e3a8a !important; }
        .download-active .divider { border-color: #e2e8f0 !important; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div id="capture-area" class="result-card-main p-8 md:p-12 rounded-3xl max-w-2xl w-full mt-10">
        <div class="text-center border-b border-slate-700 pb-8 mb-8 divider">
            <h1 class="header-title text-2xl md:text-3xl font-bold text-amber-400 mb-3">ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬</h1>
            <p class="text-slate-400 text-sm font-medium label-text">আয়োজক: মেহেরপুর ডিবেটিং ফোরাম</p>
            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-widest label-text">মেহেরপুর ডিবেটিং ফোরাম • জেন-জি ডিবেটিং সোসাইটি • কুষ্টিয়া ডিবেটিং সোসাইটি</p>
        </div>

        <div id="results-list" class="space-y-12">
            </div>

        <div class="mt-12 pt-6 border-t border-slate-700 text-center divider">
            <p class="text-[10px] text-slate-500 italic label-text">এটি একটি সিস্টেম জেনারেটেড ডিজিটাল ফলাফল কার্ড।</p>
        </div>
    </div>

    <div class="mt-10 flex flex-wrap justify-center gap-4 w-full max-w-2xl no-print">
        <button onclick="downloadImage()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-4 rounded-2xl shadow-lg transition transform hover:-translate-y-1">🖼️ ছবি সেভ করুন</button>
        <button onclick="downloadPDF()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition transform hover:-translate-y-1">📄 PDF সেভ করুন</button>
        <a href="index.html" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl text-center transition">🏠 হোম</a>
    </div>

    <script src="data.js"></script>
    <script>
        const phone = localStorage.getItem('userPhone');
        const userResults = allParticipants.filter(p => p.phone === phone);
        const list = document.getElementById('results-list');

        if (userResults.length > 0) {
            userResults.forEach((user, index) => {
                const segmentComps = allParticipants.filter(p => p.segment === user.segment).sort((a,b) => b.mark - a.mark);
                const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;
                
                list.innerHTML += `
                    <div class="${index > 0 ? 'border-t border-dashed border-slate-700 pt-10 divider' : ''}">
                        <div class="grid grid-cols-1 gap-y-4 text-lg">
                            <div class="flex justify-between border-b border-slate-800/50 pb-2 divider">
                                <span class="text-slate-400 font-medium label-text">অংশগ্রহণকারীর নাম</span>
                                <span class="text-white font-bold val-text">${user.name}</span>
                            </div>
                            <div class="flex justify-between border-b border-slate-800/50 pb-2 divider">
                                <span class="text-slate-400 font-medium label-text">শিক্ষা প্রতিষ্ঠান</span>
                                <span class="text-white font-bold val-text">${user.institute}</span>
                            </div>
                            <div class="flex justify-between border-b border-slate-800/50 pb-2 divider">
                                <span class="text-slate-400 font-medium label-text">প্রতিযোগিতার বিভাগ</span>
                                <span class="text-amber-400 font-bold val-text">${user.segment}</span>
                            </div>
                            <div class="flex justify-between border-b border-slate-800/50 pb-2 divider">
                                <span class="text-slate-400 font-medium label-text">প্রাপ্ত স্কোর</span>
                                <span class="text-white font-bold val-text">${user.mark}</span>
                            </div>
                        </div>
                        <div class="pos-box mt-8 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 text-center">
                            <span class="text-slate-400 text-sm block mb-1 label-text">ফলাফল মেধা তালিকা</span>
                            <span class="text-3xl font-black text-amber-400 uppercase tracking-tighter header-title">অবস্থান: ${pos} তম</span>
                        </div>
                    </div>`;
            });
        } else {
            window.location.href = 'signup.html';
        }

        // --- প্রফেশনাল ইমেজ ডাউনলোড ফাংশন ---
        function downloadImage() {
            const el = document.getElementById('capture-area');
            el.classList.add('download-active'); // সাদা থিম অ্যাপ্লাই

            html2canvas(el, {
                scale: 3, // হাই কোয়ালিটি
                backgroundColor: "#ffffff",
                logging: false,
                useCORS: true
            }).then(canvas => {
                const a = document.createElement('a');
                a.download = `Result_${phone}.png`;
                a.href = canvas.toDataURL("image/png");
                a.click();
                el.classList.remove('download-active'); // ডার্ক থিমে ফেরত
            });
        }

        // --- প্রফেশনাল PDF ডাউনলোড ফাংশন ---
        function downloadPDF() {
            const el = document.getElementById('capture-area');
            el.classList.add('download-active');

            const opt = {
                margin: 0.5,
                filename: `Result_${phone}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, backgroundColor: "#ffffff" },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(el).save().then(() => {
                el.classList.remove('download-active');
            });
        }
    </script>
</body>
</html>
