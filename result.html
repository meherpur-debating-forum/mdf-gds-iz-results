<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল ও সনদপত্র | ইনকিলাব জিন্দাবাদ ২০২৬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: #f1f5f9; }
        .result-card { background: #1e293b; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Hidden Rendering Container */
        #cert-hidden-container {
            position: absolute;
            left: -9999px;
            top: 0;
        }

        #certificate-canvas {
            width: 1414px; /* A4 Ratio High Res */
            height: 1000px;
            background: white;
            position: relative;
            overflow: hidden;
        }

        /* অ্যালাইনমেন্ট সেটিংস */
        #content-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 420px; /* নাম ও বয়ানকে ইমেজের ফাঁকা জায়গায় বসানোর জন্য */
        }

        .cert-name {
            font-size: 62px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 25px;
            font-family: 'Hind Siliguri', sans-serif;
            text-align: center;
        }

        .cert-body {
            font-size: 22px;
            line-height: 1.6;
            color: #000000;
            font-family: 'Hind Siliguri', sans-serif;
            text-align: center;
            max-width: 900px; /* যাতে সাইডের কিউআর কোড বা ডিজাইনকে টাচ না করে */
            margin: 0 auto;
            font-weight: 500;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <!-- পেজ ভিউ -->
    <div id="capture-area" class="result-card p-8 md:p-12 rounded-3xl max-w-2xl w-full mt-10">
        <div class="text-center border-b border-slate-700 pb-6 mb-8">
            <h1 class="text-2xl font-bold text-amber-400">ইনকিলাব জিন্দাবাদ ২০২৬</h1>
            <p class="text-slate-400 italic">ফলাফল ও ডিজিটাল সনদপত্র</p>
        </div>

        <div id="results-display" class="space-y-8">
            <!-- Data from data.js -->
        </div>

        <div class="mt-12 pt-6 border-t border-slate-700 text-center">
            <p class="text-xs text-slate-500 italic font-medium">নিচের বাটন চেপে আপনার সনদপত্র সংগ্রহ করুন</p>
        </div>
    </div>

    <!-- কন্ট্রোল বাটন -->
    <div class="mt-8 flex flex-wrap justify-center gap-4 w-full max-w-2xl mb-20">
        <button id="btn-png" onclick="processCertificate('png')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-4 rounded-2xl shadow-lg transition active:scale-95 disabled:opacity-50">🖼️ সেভ পিএনজি (PNG)</button>
        <button id="btn-pdf" onclick="processCertificate('pdf')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition active:scale-95 disabled:opacity-50">📄 সেভ পিডিএফ (PDF)</button>
        <a href="index.html" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl text-center flex items-center justify-center">🏠 হোম</a>
    </div>

    <!-- প্রোডাকশন রেন্ডার ইঞ্জিন -->
    <div id="cert-hidden-container">
        <div id="certificate-canvas">
            <img id="cert-bg" src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/Black%20and%20White%20Simple%20Page%20Border%20A4_20260318_224236_0000.png" 
                 class="absolute inset-0 w-full h-full object-fill" 
                 crossOrigin="anonymous">
            
            <div id="content-wrapper">
                <h1 id="out-name" class="cert-name">নাম</h1>
                <p id="out-body" class="cert-body">
                    সনদপত্রের বয়ান লোড হচ্ছে...
                </p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const phone = localStorage.getItem('userPhone');
        const userResults = allParticipants.filter(p => p.phone === phone);
        const display = document.getElementById('results-display');

        if (userResults.length > 0) {
            userResults.forEach((user, index) => {
                const segmentComps = allParticipants.filter(p => p.segment === user.segment).sort((a,b) => b.mark - a.mark);
                const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;
                
                display.innerHTML += `
                    <div class="${index > 0 ? 'border-t border-slate-700 pt-6' : ''}">
                        <div class="space-y-3">
                            <div class="flex justify-between border-b border-slate-800 pb-1">
                                <span class="text-slate-400">অংশগ্রহণকারী:</span>
                                <span class="text-white font-bold">${user.name}</span>
                            </div>
                            <div class="flex justify-between border-b border-slate-800 pb-1">
                                <span class="text-slate-400">বিভাগ:</span>
                                <span class="text-amber-400 font-bold">${user.segment}</span>
                            </div>
                        </div>
                        <div class="mt-6 bg-slate-800/40 py-5 rounded-2xl border border-slate-700 text-center">
                            <span class="text-2xl font-black text-amber-500">${pos} তম স্থান</span>
                        </div>
                    </div>`;
            });
        } else {
            window.location.href = 'signup.html';
        }

        async function processCertificate(type) {
            if (userResults.length === 0) return;
            
            const btnPng = document.getElementById('btn-png');
            const btnPdf = document.getElementById('btn-pdf');
            btnPng.disabled = true;
            btnPdf.disabled = true;
            btnPng.innerText = "তৈরি হচ্ছে...";

            const user = userResults[0]; 
            const segmentComps = allParticipants.filter(p => p.segment === user.segment).sort((a,b) => b.mark - a.mark);
            const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;

            document.getElementById('out-name').innerText = user.name;
            const body = document.getElementById('out-body');
            
            if (user.segment.includes("গ্রাফিতি")) {
                body.innerHTML = `এত দ্বারা প্রত্যয়ন করা হইতেসে যে, মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটির যৌথ উদ্যোগে আয়োজিত ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬ এ গ্রাফিতি অঙ্কন সেগমেন্টে উক্ত প্রতিষ্ঠানের কৃতি শিক্ষার্থী গণ (${user.name}) অংশগ্রহণ করিয়াছিলেন। তাহাদিগের এই অসামান্য অবদানের জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো যাইতেসে যে তাহারা ${user.mark} মার্ক অর্জনের সহিত ${pos} তম স্থান অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য জেন-জি ডিবেটিং সোসাইটি ও মেহেরপুর ডিবেটিং ফোরাম গর্বিত ও তাহার আগামী জীবনের সাফল্য কামনা করে।`;
            } else {
                body.innerHTML = `এত দ্বারা প্রত্যয়ন করা হইতেছে যে, মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটির যৌথ উদ্যোগে আয়োজিত ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬ এ "${user.segment} সেগমেন্টে" "${user.institute} হইতে" উক্ত কৃতি শিক্ষার্থী অংশগ্রহণ করিয়াছিলো। তাহার অসামান্য অবদান এর জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো হইতেছে যে তিনি উক্ত সেগমেন্টে ${user.mark} মার্ক অর্জনের সহিত ${pos} তম অবস্থান অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য জেন-জি ডিবেটিং সোসাইটি ও মেহেরপুর ডিবেটিং ফোরাম গর্বিত ও তাহার আগামী জীবনের সাফল্য কামনা করে।`;
            }

            await new Promise(r => setTimeout(r, 600));

            try {
                const canvas = await html2canvas(document.getElementById('certificate-canvas'), { 
                    scale: 4, 
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false
                });

                if (type === 'png') {
                    const link = document.createElement('a');
                    link.download = `Cert_${user.name}.png`;
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.click();
                } else {
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`Cert_${user.name}.pdf`);
                }
            } catch (err) {
                console.error("Download Error:", err);
            } finally {
                btnPng.disabled = false;
                btnPdf.disabled = false;
                btnPng.innerText = "🖼️ সেভ পিএনজি (PNG)";
            }
        }
    </script>
</body>
</html>
