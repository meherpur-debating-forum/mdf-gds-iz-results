<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল ও সার্টিফিকেট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fbbf24; --bg-dark: #020617; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }

        .entry-stage { position: fixed; inset: 0; z-index: 100; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; transition: all 1s ease; }
        .hidden-stage { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .ui-card { background: #1e293b; border: 1px solid #334155; transform: translateY(20px); opacity: 0; transition: all 0.8s ease 0.5s; }
        .ui-card.show { transform: translateY(0); opacity: 1; }

        .stat-box { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(71, 85, 105, 0.4); }

        #cert-hidden-container { position: absolute; left: -9999px; top: 0; }
        #certificate-canvas { width: 2784px; height: 2016px; background: white; position: relative; overflow: hidden; }
        #writing-zone { position: absolute; top: 490px; bottom: 595.2px; left: 172.8px; right: 700.8px; display: flex; flex-direction: column; align-items: center; }
        .cert-name-final { font-size: 110px; font-weight: 800; color: #000; margin-bottom: 40px; text-align: center; line-height: 1.2; }
        .cert-body-final { font-size: 52px; line-height: 1.5; color: #000; text-align: center; font-weight: 500; max-width: 2100px; }
        
        #phone-watermark { position: absolute; bottom: 10px; right: 10px; font-size: 20px; color: #000; font-weight: 600; font-family: sans-serif; opacity: 0.7; }

        .b { font-weight: 800; }
        .highlight { font-weight: 900; text-decoration: underline; text-underline-offset: 10px; }

        @keyframes pulse-gold { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .generating-text { animation: pulse-gold 2s infinite; }
        .progress-bar-fill { transition: width 1s linear; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen pb-20">

    <audio id="bgMusic" loop>
        <source src="bg.mp3" type="audio/mpeg">
    </audio>

    <div id="entryStage" class="entry-stage">
        <div class="text-center">
            <div class="mb-8 p-6">
                <img src="iz-logo.jpg" class="w-24 h-24 rounded-2xl mx-auto shadow-2xl border border-amber-500/30 mb-4">
                <h3 class="text-amber-500 font-bold tracking-widest text-xs uppercase">Security Verified</h3>
            </div>
            <button onclick="accessPortal()" class="bg-amber-500 text-slate-900 px-12 py-4 rounded-2xl font-black text-xl shadow-[0_0_40px_rgba(251,191,36,0.3)] hover:scale-105 transition active:scale-95">
                ফলাফল দেখুন 📄
            </button>
        </div>
    </div>

    <div id="mainUI" class="ui-card p-6 md:p-10 rounded-[2.5rem] max-w-2xl w-full mt-6 shadow-2xl">
        <div class="text-center border-b border-slate-700 pb-6 mb-6">
            <h1 class="text-2xl font-bold text-amber-400 mb-1 leading-tight">ইনকিলাব জিন্দাবাদ : জাতীয় জাগরণ প্রতিযোগিতা ২০২৬</h1>
            <p class="text-slate-400 text-[12px] uppercase tracking-widest">ফলাফল ও সার্টিফিকেট পোর্টাল</p>
        </div>

        <div id="wait-container" class="mb-8 p-6 bg-slate-900/50 rounded-3xl border border-amber-500/20 text-center">
            <div class="mb-4">
                <span class="text-amber-400 text-4xl block mb-2 generating-text">⚙️</span>
                <h2 class="text-lg font-bold text-white mb-1">আপনার সার্টিফিকেট তৈরি হচ্ছে...</h2>
                <p class="text-slate-400 text-sm">অনুগ্রহ করে কিছুক্ষণ অপেক্ষা করুন</p>
            </div>
            <div class="w-full bg-slate-800 rounded-full h-2 mb-4 overflow-hidden">
                <div id="progress-fill" class="progress-bar-fill bg-amber-500 h-full" style="width: 0%"></div>
            </div>
            <div class="text-2xl font-mono font-bold text-amber-500" id="timer">02:00</div>
        </div>

        <div id="status-box" class="space-y-10"></div>

        <div class="mt-12 pt-6 border-t border-slate-800 text-center">
             <p class="text-[10px] text-slate-500 italic mb-6">সতর্কবার্তা: এটি একটি অটো-জেনারেটেড কপি। দাপ্তরিক কাজে মূল সার্টিফিকেট প্রযোজ্য।</p>
             <button onclick="logout()" class="text-amber-500 hover:text-white text-sm transition underline">অন্য নম্বর দিয়ে ফলাফল দেখুন</button>
        </div>
    </div>

    <div id="cert-hidden-container">
        <div id="certificate-canvas">
            <img src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/iz-certicificate_20260319_010229_0000.png" 
                 class="absolute inset-0 w-full h-full object-fill" crossOrigin="anonymous">
            <div id="writing-zone">
                <h1 id="out-name" class="cert-name-final">লোডিং...</h1>
                <div id="out-body" class="cert-body-final"></div>
            </div>
            <div id="phone-watermark"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const bgMusic = document.getElementById('bgMusic');
        const phone = localStorage.getItem('userPhone');
        if (!phone) { window.location.href = 'signup.html'; }

        window.addEventListener('load', () => {
            const savedTime = localStorage.getItem('musicCurrentTime');
            if (savedTime) { bgMusic.currentTime = parseFloat(savedTime); }
        });

        bgMusic.ontimeupdate = () => { localStorage.setItem('musicCurrentTime', bgMusic.currentTime); };

        function accessPortal() {
            bgMusic.play().catch(() => {});
            document.getElementById('entryStage').classList.add('hidden-stage');
            document.getElementById('mainUI').classList.add('show');
            startTimer();
        }

        // নম্বর ইংরেজিতে থাকলেও যেন ফিল্টার কাজ করে
        const userResults = allParticipants.filter(p => String(p.phone) === String(phone));
        const statusBox = document.getElementById('status-box');

        function renderResults(isLocked) {
            if (userResults.length > 0) {
                statusBox.innerHTML = '';
                userResults.forEach((user, index) => {
                    const segData = allParticipants.filter(p => p.segment === user.segment);
                    
                    let jointText = "";
                    const isPoetry = user.segment.includes("কবিতা");

                    if(isPoetry) {
                        // মার্ক দশমিক হলেও যেন স্ট্রিং হিসেবে নির্ভুলভাবে কাজ করে
                        const othersWithSameMark = segData.filter(p => String(p.mark) === String(user.mark) && p.name !== user.name);
                        if(othersWithSameMark.length > 0) {
                            const names = othersWithSameMark.map(p => p.name).join(', ');
                            const suffix = othersWithSameMark.length === 1 ? "-এর" : "-দের";
                            jointText = `<p class="text-amber-200/60 text-[10px] mt-2 leading-relaxed font-medium">${names}${suffix} সাথে যৌথভাবে অবস্থান ${user.position}</p>`;
                        }
                    }

                    const isGraffiti = user.segment.includes("গ্রাফিতি");
                    const members = isGraffiti ? user.name.split(',').map(m => m.trim()) : [user.name];

                    let btnHTML = isLocked ? `<div class="col-span-2 py-4 text-center bg-slate-800/50 rounded-xl text-slate-500 text-xs italic">সার্টিফিকেট জেনারেট হলে বাটন দৃশ্যমান হবে</div>` : 
                        (isGraffiti ? `
                        <div class="col-span-2 mb-2"><button onclick="generate(${index}, '${user.institute || 'Institution'}', true)" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl text-sm transition active:scale-95 shadow-lg">🏢 প্রতিষ্ঠানের সার্টিফিকেট</button></div>
                        <div class="col-span-2 grid grid-cols-2 gap-2">${members.map(m => `<button onclick="generate(${index}, '${m}', false)" class="bg-slate-700 text-white py-2 rounded-lg text-[11px] border border-slate-600 active:scale-95">👤 ${m}</button>`).join('')}</div>` : 
                        `<button onclick="generate(${index}, '${user.name}', false)" class="col-span-2 bg-indigo-600 text-white font-bold py-4 rounded-xl text-sm transition active:scale-95 shadow-lg">📥 সার্টিফিকেট ডাউনলোড</button>`);

                    statusBox.innerHTML += `
                        <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700">
                            <div class="text-center mb-6">
                                <span class="bg-amber-500/10 text-amber-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-amber-500/20">${user.segment}</span>
                                <h3 class="text-white text-xl font-bold mt-2">${user.name}</h3>
                                <p class="text-slate-400 text-xs">${user.institute || 'N/A'}</p>
                                ${jointText}
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-6">
                                <div class="stat-box p-3 rounded-2xl text-center"><p class="text-slate-500 text-[10px] uppercase">মার্ক</p><p class="text-xl font-black">${user.mark}</p></div>
                                <div class="stat-box p-3 rounded-2xl text-center"><p class="text-slate-500 text-[10px] uppercase">পজিশন</p><p class="text-xl font-black text-amber-500">${user.position}</p></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">${btnHTML}</div>
                        </div>`;
                });
            } else {
                statusBox.innerHTML = `<div class="text-center p-10 bg-slate-800/50 rounded-3xl border border-red-500/20 text-red-400 font-bold">এই নম্বরের বিপরীতে কোনো ফলাফল পাওয়া যায়নি।</div>`;
            }
        }

        renderResults(true);

        function startTimer() {
            let timeLeft = 120;
            const timerEl = document.getElementById('timer');
            const progressEl = document.getElementById('progress-fill');
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
                progressEl.style.width = (((120 - timeLeft) / 120) * 100) + '%';
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    document.getElementById('wait-container').innerHTML = `<div class="text-green-400 font-bold flex items-center justify-center gap-2 py-2">✅ সার্টিফিকেট জেনারেট সম্পন্ন!</div>`;
                    renderResults(false);
                }
            }, 1000);
        }

        async function generate(idx, targetName, isInst) {
            const user = userResults[idx];
            document.getElementById('out-name').innerText = targetName;
            document.getElementById('phone-watermark').innerText = phone;
            
            const mdf = `<span class="b">মেহেরপুর ডিবেটিং ফোরাম</span>`, gds = `<span class="b">জেন-জি ডিবেটিং সোসাইটি</span>`;
            const event = `<span class="b">ইনকিলাব জিন্দাবাদ : জাতীয় জাগরণ প্রতিযোগিতা ২০২৬</span>`;
            const marks = `<span class="highlight">${user.mark} মার্ক</span>`, position = `<span class="highlight">${user.position} অবস্থান</span>`;
            
            document.getElementById('out-body').innerHTML = isInst ? 
                `এত দ্বারা প্রত্যয়ন করা হইতেছে যে, ${mdf} ও ${gds} এর যৌথ উদ্যোগে আয়োজিত ${event} এ গ্রাফিতি অঙ্কন সেগমেন্টে উক্ত প্রতিষ্ঠানের কৃতি শিক্ষার্থীগণ অংশগ্রহণ করিয়াছিলেন। তাহাদিগের এই অসামান্য অবদানের জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো যাইতেছে যে তাহারা ${marks} অর্জনের সহিত ${position} অধিকার করিয়াছেন। তাহারা এই কৃতিত্বের জন্য ${gds} ও ${mdf} গর্বিত।` : 
                `এত দ্বারা প্রত্যয়ন করা হইতেছে যে, ${mdf} ও ${gds} এর যৌথ উদ্যোগে আয়োজিত ${event} এ <span class="b">${user.segment} সেগমেন্টে</span> ${user.institute ? `<span class="b">${user.institute}</span> হইতে` : `উক্ত প্রতিষ্ঠান হইতে`} উক্ত কৃতি শিক্ষার্থী অংশগ্রহণ করিয়াছিলো। তাহার অসামান্য অবদানের জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো যাইতেছে যে তিনি ${marks} অর্জনের সহিত ${position} অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য ${gds} ও ${mdf} গর্বিত।`;

            try {
                const canvas = await html2canvas(document.getElementById('certificate-canvas'), { scale: 1, useCORS: true });
                const pdf = new jspdf.jsPDF({ orientation: 'l', unit: 'in', format: [29, 21] });
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 29, 21);
                pdf.save(`Certificate_${targetName}.pdf`);
            } catch (e) { console.error(e); }
        }

        function logout() { localStorage.removeItem('userPhone'); window.location.href = 'signup.html'; }
    </script>
</body>
</html>
