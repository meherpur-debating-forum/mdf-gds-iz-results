<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>রেজাল্ট ও সার্টিফিকেট</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #fbbf24; --deep-bg: #020617; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--deep-bg);
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        /* Entry Stage Overlay */
        #introStage {
            position: fixed; inset: 0; z-index: 5000;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Certificate Canvas Area (Hidden) */
        #cert-hidden-container { position: absolute; left: -9999px; top: 0; }
        #certificate-canvas { 
            width: 2784px; height: 2016px; 
            background: white; position: relative; overflow: hidden; 
        }
        #writing-zone { 
            position: absolute; top: 490px; bottom: 595.2px; 
            left: 172.8px; right: 700.8px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .cert-name-final { font-size: 110px; font-weight: 800; color: #000; margin-bottom: 40px; text-align: center; }
        .cert-body-final { font-size: 52px; line-height: 1.5; color: #000; text-align: center; }
        .b { font-weight: 800; }
        .highlight { font-weight: 900; text-decoration: underline; text-underline-offset: 10px; }

        /* ID Number Area (Bottom Right) */
        #id-zone {
            position: absolute;
            right: 96px; /* 1 inch from right */
            bottom: 48px; /* 0.5 inch from bottom */
            width: 480px; /* 5 inch width */
            height: 67px; /* 0.7 inch height */
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-family: 'Courier New', Courier, monospace; /* Monospaced for numbers */
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <audio id="bgMusic" loop preload="auto">
        <source src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/bg.mp3" type="audio/mpeg">
    </audio>

    <div id="introStage">
        <div id="loaderUI" class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-amber-500/80 font-bold animate-pulse uppercase tracking-widest text-xs">ব্যাবস্থাপনা নিশ্চিত করা হচ্ছে...</p>
        </div>

        <div id="readyUI" class="hidden text-center scale-90 opacity-0 transition-all duration-700">
            <div class="mb-8">
                <div class="w-20 h-20 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                    <span class="text-amber-500 text-3xl">📄</span>
                </div>
                <h1 class="text-white text-3xl font-black">ফলাফল প্রস্তুত!</h1>
                <p class="text-slate-400 mt-2">আপনার মেধা স্বীকৃতির সনদ এখন ডাউনলোডযোগ্য</p>
            </div>
            <button onclick="activatePortal()" class="bg-amber-500 text-slate-950 px-12 py-5 rounded-2xl font-black text-xl shadow-[0_20px_50px_rgba(251,191,36,0.2)] active:scale-95 transition-all">
                ফলাফল দেখুন ➔
            </button>
        </div>
    </div>

    <div id="mainUI" class="hidden max-w-2xl mx-auto py-10 opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-8">
            <div>
                <h2 class="text-2xl font-black text-white tracking-tighter">RESULT <span class="text-amber-500">PORTAL</span></h2>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Inquilab Zindabad 2026</p>
            </div>
            <button onclick="logout()" class="bg-slate-800 text-slate-400 px-4 py-2 rounded-xl text-xs font-bold hover:text-white transition">লগআউট</button>
        </header>

        <div class="bg-green-500/10 border border-green-500/20 p-6 rounded-[1.5rem] mb-10 text-center">
            <div class="text-green-400 font-bold flex items-center justify-center gap-2">
                <span>✅ আপনার সনদপত্রসমূহ ডাউনলোডের জন্য উন্মুক্ত</span>
            </div>
            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-tighter">Verified & Secured by MDF Systems</p>
        </div>

        <div id="resultsList" class="space-y-8"></div>
    </div>

    <div id="downloadOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[6000] hidden items-center justify-center">
        <div class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-white font-bold text-lg">সনদপত্র তৈরি হচ্ছে...</p>
            <p class="text-slate-500 text-xs mt-2 italic">অনুগ্রহ করে কিছুক্ষণ অপেক্ষা করুন</p>
        </div>
    </div>

    <div id="cert-hidden-container">
        <div id="certificate-canvas">
            <img src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/iz-certicificate_20260319_010229_0000.png" class="absolute inset-0 w-full h-full" crossOrigin="anonymous">
            <div id="writing-zone">
                <h1 id="out-name" class="cert-name-final"></h1>
                <div id="out-body" class="cert-body-final"></div>
            </div>
            <!-- ID Number Zone -->
            <div id="id-zone"></div>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        const userPhone = localStorage.getItem('userPhone');
        if (!userPhone) window.location.replace('signup.html');

        window.onload = function() {
            setTimeout(() => {
                if (typeof allParticipants !== 'undefined') {
                    document.getElementById('loaderUI').classList.add('hidden');
                    const ready = document.getElementById('readyUI');
                    ready.classList.remove('hidden');
                    setTimeout(() => { ready.classList.add('scale-100', 'opacity-100'); }, 50);
                } else {
                    document.getElementById('loaderUI').innerHTML = `<p class="text-red-500">ডাটাবেস কানেকশন এরর!</p>`;
                }
            }, 1500);
        };

        function activatePortal() {
            document.getElementById('bgMusic').play().catch(() => {});
            document.getElementById('introStage').style.display = 'none';
            const main = document.getElementById('mainUI');
            main.classList.remove('hidden');
            setTimeout(() => main.classList.add('opacity-100'), 50);
            renderData();
        }

        function renderData() {
            const container = document.getElementById('resultsList');
            const myData = allParticipants.filter(p => String(p.phone).trim() === String(userPhone).trim());
            container.innerHTML = "";

            if (myData.length === 0) {
                container.innerHTML = `<div class="glass-card p-10 text-center text-slate-500">দুঃখিত, কোনো তথ্য পাওয়া যায়নি!</div>`;
                return;
            }

            myData.forEach((item, idx) => {
                const isGraffiti = item.segment.includes("গ্রাফিতি");
                const members = isGraffiti ? item.name.split(',').map(n => n.trim()) : [item.name];
                
                let btnArea = "";
                if (isGraffiti) {
                    btnArea = `
                        <button onclick="generate('${idx}', '${item.institute}', true)" class="w-full bg-amber-500 text-slate-950 py-4 rounded-xl font-black mb-3 shadow-lg hover:bg-amber-400 transition">🏢 প্রতিষ্ঠানের সার্টিফিকেট</button>
                        <div class="grid grid-cols-2 gap-2">
                            ${members.map(m => `
                                <button onclick="generate('${idx}', '${m}', false)" class="bg-slate-800 text-white py-2 rounded-lg text-[10px] font-bold border border-slate-700 hover:bg-slate-700 transition">👤 ${m}</button>
                            `).join('')}
                        </div>
                    `;
                } else {
                    btnArea = `<button onclick="generate('${idx}', '${item.name}', false)" class="w-full bg-amber-500 text-slate-950 py-4 rounded-xl font-black shadow-lg hover:bg-amber-400 transition">📥 ডাউনলোড করুন</button>`;
                }

                container.innerHTML += `
                    <div class="glass-card p-8 border-l-4 border-amber-500">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="text-[10px] uppercase font-bold text-amber-500 tracking-widest">${item.segment}</span>
                                <h3 class="text-xl font-bold text-white mt-1">${item.name}</h3>
                                <p class="text-xs text-slate-400 mt-1">${item.institute}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-3xl font-black text-amber-500">${item.position || 'N/A'}</div>
                                <p class="text-[10px] uppercase text-slate-600 font-bold">Rank</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-slate-950/50 p-4 rounded-xl border border-white/5">
                                <p class="text-[10px] text-slate-500 uppercase font-bold">Score</p>
                                <p class="text-xl font-bold text-white">${item.mark || '0'}</p>
                            </div>
                            <div class="bg-slate-950/50 p-4 rounded-xl border border-white/5">
                                <p class="text-[10px] text-slate-500 uppercase font-bold">Status</p>
                                <p class="text-xl font-bold text-green-400">সাফল্য 🏆</p>
                            </div>
                        </div>
                        ${btnArea}
                    </div>
                `;
            });
        }

        async function generate(idx, targetName, isInst) {
            const overlay = document.getElementById('downloadOverlay');
            overlay.style.display = 'flex';

            const myData = allParticipants.filter(p => String(p.phone).trim() === String(userPhone).trim());
            const item = myData[idx];

            // ডাটা সেট করা
            document.getElementById('out-name').innerText = targetName;
            
            // ইউনিক আইডি নম্বর জেনারেট করা (যেমন: IZ-PHONE-INDEX)
            const uniqueID = `ID: IZ-${item.phone.slice(-4)}-${idx + 1}`;
            document.getElementById('id-zone').innerText = uniqueID;

            const eventStr = `<span class="b">ইনকিলাব জিন্দাবাদ ২০২৬</span>`;
            const statsStr = `<span class="highlight">${item.mark} মার্ক</span> ও <span class="highlight">${item.position} তম অবস্থান</span>`;

            const bodyContent = isInst ? 
                `প্রত্যয়ন করা যাইতেছে যে, মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটির উদ্যোগে আয়োজিত ${eventStr} এ উক্ত প্রতিষ্ঠানের কৃতি শিক্ষার্থীগণ অংশগ্রহণ করিয়াছিলেন এবং তাহারা ${statsStr} অর্জন করিয়াছেন।` :
                `প্রত্যয়ন করা যাইতেছে যে, মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটির উদ্যোগে আয়োজিত ${eventStr} এ <span class="b">${item.segment}</span> সেগমেন্টে অংশগ্রহণ করিয়া এই শিক্ষার্থী ${statsStr} অধিকার করিয়াছেন।`;

            document.getElementById('out-body').innerHTML = bodyContent;

            try {
                const canvas = await html2canvas(document.getElementById('certificate-canvas'), { 
                    scale: 1, 
                    useCORS: true,
                    logging: false
                });
                const pdf = new jspdf.jsPDF({ orientation: 'l', unit: 'in', format: [29, 21] });
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 29, 21);
                pdf.save(`Certificate_${targetName}.pdf`);
            } catch (err) {
                console.error(err);
                alert("ডাউনলোডে সমস্যা হয়েছে। আবার চেষ্টা করুন।");
            } finally {
                overlay.style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('userPhone');
            window.location.replace('signup.html');
        }
    </script>
</body>
</html>
