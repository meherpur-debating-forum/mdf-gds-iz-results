<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল কার্ড | ইনকিলাব জিন্দাবাদ ২০২৬</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
        }
        /* প্রিন্ট বা ডাউনলোডের জন্য বিশেষ স্টাইল */
        .download-mode { 
            background: white !important; 
            color: black !important; 
            border: 2px solid #000 !important;
            padding: 40px !important;
            width: 800px !important; /* স্ট্যান্ডার্ড উইডথ */
        }
        .download-mode .text-gray-400, .download-mode .text-gray-500 { color: #444 !important; }
        .download-mode h1, .download-mode #pos-badge { color: #004085 !important; }
        .download-mode .result-divider { border-color: #ccc !important; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 md:p-10">

    <div id="result-card" class="bg-[#1e1e1e] border border-gray-800 rounded-3xl p-6 md:p-10 max-w-2xl w-full shadow-2xl">
        
        <div class="text-center border-b border-gray-700 pb-6 mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-[#ffd700]">ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬</h1>
            <div class="mt-3 space-y-1">
                <p class="text-gray-400 font-semibold">আয়োজক: মেহেরপুর ডিবেটিং ফোরাম</p>
                <p class="text-xs text-gray-500 italic">সহ-আয়োজক: জেন-জি ডিবেটিং সোসাইটি | পার্টনার: কুষ্টিয়া ডিবেটিং সোসাইটি</p>
            </div>
        </div>

        <div id="user-results-container" class="space-y-10">
            <p class="text-center animate-pulse text-gray-500">ফলাফল খোঁজা হচ্ছে...</p>
        </div>
    </div>

    <div class="mt-10 flex flex-wrap justify-center gap-4 w-full max-w-2xl">
        <button onclick="downloadImage()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg">🖼️ ছবি সেভ করুন</button>
        <button onclick="downloadPDF()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg">📄 PDF ডাউনলোড</button>
        <a href="index.html" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-xl text-center transition">🏠 হোম</a>
    </div>

    <script src="data.js"></script>
    <script>
        const phone = localStorage.getItem('userPhone');
        const userResults = allParticipants.filter(p => p.phone === phone);
        const container = document.getElementById('user-results-container');

        if (userResults.length > 0) {
            let htmlContent = '';

            userResults.forEach((user, index) => {
                // পজিশন ক্যালকুলেশন (সেগমেন্ট ওয়াইজ)
                const segmentCompetitors = allParticipants
                    .filter(p => p.segment === user.segment)
                    .sort((a, b) => b.mark - a.mark);
                
                const position = segmentCompetitors.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;

                htmlContent += `
                    <div class="${index > 0 ? 'result-divider pt-10 border-t border-dashed border-gray-700' : ''}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-lg">
                            <div><span class="text-gray-500 font-semibold">নাম:</span> <span class="text-white ml-2">${user.name}</span></div>
                            <div><span class="text-gray-500 font-semibold">মোবাইল:</span> <span class="text-white ml-2">${user.phone}</span></div>
                            <div class="md:col-span-2"><span class="text-gray-500 font-semibold">প্রতিষ্ঠান:</span> <span class="text-white ml-2">${user.institute}</span></div>
                            <div><span class="text-gray-500 font-semibold">বিভাগ:</span> <span class="text-[#ffd700] font-bold ml-2">${user.segment}</span></div>
                            <div><span class="text-gray-500 font-semibold">প্রাপ্ত নম্বর:</span> <span class="text-white ml-2">${user.mark}</span></div>
                        </div>
                        <div id="pos-badge" class="mt-6 text-3xl font-extrabold text-[#ffd700] bg-[#252525] inline-block px-6 py-2 rounded-lg border border-gray-700">
                            অবস্থান: ${position} তম
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        } else {
            container.innerHTML = `<div class="text-center text-red-500 font-bold">কোনো ফলাফল পাওয়া যায়নি। অনুগ্রহ করে সঠিক নম্বর দিয়ে লগইন করুন।</div>`;
        }

        // ছবি হিসেবে ডাউনলোড
        function downloadImage() {
            const element = document.getElementById('result-card');
            element.classList.add('download-mode');

            html2canvas(element, { 
                scale: 3,
                backgroundColor: "#ffffff",
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Inqilab_Result_${phone}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                element.classList.remove('download-mode');
            });
        }

        // PDF হিসেবে ডাউনলোড
        function downloadPDF() {
            const element = document.getElementById('result-card');
            element.classList.add('download-mode');

            const options = {
                margin: 0.3,
                filename: `Inqilab_Result_${phone}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, backgroundColor: "#ffffff" },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(element).save().then(() => {
                element.classList.remove('download-mode');
            });
        }
    </script>
</body>
</html>
