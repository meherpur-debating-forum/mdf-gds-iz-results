<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>রেজাল্ট ও সার্টিফিকেট</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #fbbf24; --deep-bg: #020617; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--deep-bg);
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 2.5rem;
            transition: all 0.3s ease;
        }

        #introStage {
            position: fixed; inset: 0; z-index: 5000;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Certificate Rendering Area */
        #cert-hidden-container { position: absolute; left: -9999px; top: 0; }
        #certificate-canvas { 
            width: 2784px; height: 2016px; 
            background: white; position: relative; overflow: hidden; 
        }
        #writing-zone { 
            position: absolute; top: 480px; bottom: 580px; 
            left: 172.8px; right: 700.8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cert-name-final { font-size: 115px; font-weight: 800; color: #000; margin-bottom: 45px; text-align: center; }
        .cert-body-final { font-size: 52px; line-height: 1.6; color: #000; text-align: center; font-weight: 500; }
        .b { font-weight: 800; }
        .highlight { font-weight: 800; text-decoration: underline; text-underline-offset: 8px; }

        #id-zone {
            position: absolute;
            right: 96px; 
            bottom: 48px; 
            width: 480px; 
            height: 67px; 
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-family: 'Courier New', Courier, monospace;
            font-size: 38px;
            font-weight: 900;
            color: #111;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <audio id="bgMusic" loop preload="auto">
        <source src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/bg.mp3" type="audio/mpeg">
    </audio>

    <div id="introStage">
        <div id="loaderUI" class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-amber-500/80 font-bold animate-pulse uppercase tracking-widest text-xs">ব্যাবস্থাপনা নিশ্চিত করা হচ্ছে...</p>
        </div>

        <div id="readyUI" class="hidden text-center scale-90 opacity-0 transition-all duration-700">
            <h1 class="text-white text-3xl font-black mb-8">ফলাফল ও সনদপত্র</h1>
            <button onclick="activatePortal()" class="bg-amber-500 text-slate-950 px-12 py-5 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all">
                পোর্টাল ওপেন করুন ➔
            </button>
        </div>
    </div>

    <div id="mainUI" class="hidden max-w-2xl mx-auto py-10 opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-8">
            <h2 class="text-2xl font-black text-white">RESULT <span class="text-amber-500">PORTAL</span></h2>
            <button onclick="logout()" class="text-red-400 font-bold text-xs uppercase tracking-widest">Logout</button>
        </header>

        <div id="resultsList" class="space-y-8"></div>
    </div>

    <div id="downloadOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-[6000] hidden items-center justify-center">
        <div class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-white font-bold text-lg">সনদপত্র জেনারেট হচ্ছে...</p>
        </div>
    </div>

    <div id="cert-hidden-container">
        <div id="certificate-canvas">
            <img src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/iz-certicificate_20260319_010229_0000.png" class="absolute inset-0 w-full h-full" crossOrigin="anonymous">
            <div id="writing-zone">
                <h1 id="out-name" class="cert-name-final"></h1>
                <div id="out-body" class="cert-body-final"></div>
            </div>
            <div id="id-zone"></div>
        </div>
    </div>

    <script src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/data.js"></script>

    <script>
        const userPhone = localStorage.getItem('userPhone');
        if (!userPhone) window.location.replace('signup.html');

        window.onload = function() {
            setTimeout(() => {
                if (typeof allParticipants !== 'undefined') {
                    document.getElementById('loaderUI').classList.add('hidden');
                    const ready = document.getElementById('readyUI');
                    ready.classList.remove('hidden');
                    setTimeout(() => { ready.classList.add('scale-100', 'opacity-100'); }, 50);
                }
            }, 1000);
        };

        function activatePortal() {
            document.getElementById('bgMusic').play().catch(() => {});
            document.getElementById('introStage').style.display = 'none';
            const main = document.getElementById('mainUI');
            main.classList.remove('hidden');
            setTimeout(() => main.classList.add('opacity-100'), 50);
            renderData();
        }

        function renderData() {
            const container = document.getElementById('resultsList');
            const myData = allParticipants.filter(p => String(p.phone).trim() === String(userPhone).trim());
            container.innerHTML = "";

            myData.forEach((item, idx) => {
                const isGraffiti = item.segment.includes("গ্রাফিতি");
                // Check if it's a team (contains comma)
                const isTeam = isGraffiti && item.name.includes(',');
                const members = isTeam ? item.name.split(',').map(n => n.trim()) : [item.name];
                
                let btnArea = "";
                if (isTeam) {
                    btnArea = `
                        <button onclick="generate('${idx}', '${item.institute}', 'inst')" class="w-full bg-amber-500 text-slate-950 py-4 rounded-xl font-black mb-3 shadow-lg">🏢 প্রতিষ্ঠানের সনদ ডাউনলোড</button>
                        <div class="grid grid-cols-2 gap-2">
                            ${members.map(m => `
                                <button onclick="generate('${idx}', '${m}', 'personal_graffiti')" class="bg-slate-800 text-white py-2 rounded-lg text-[10px] font-bold border border-slate-700">👤 ${m}</button>
                            `).join('')}
                        </div>
                    `;
                } else if (isGraffiti && !isTeam) {
                    // Single person Graffiti - acts like general
                    btnArea = `<button onclick="generate('${idx}', '${item.name}', 'general')" class="w-full bg-amber-500 text-slate-950 py-4 rounded-xl font-black shadow-lg">📥 সনদপত্র ডাউনলোড</button>`;
                } else {
                    // General segments (Poetry, Painting, etc.)
                    btnArea = `<button onclick="generate('${idx}', '${item.name}', 'general')" class="w-full bg-amber-500 text-slate-950 py-4 rounded-xl font-black shadow-lg">📥 সনদপত্র ডাউনলোড</button>`;
                }

                container.innerHTML += `
                    <div class="glass-card p-8 border-l-4 border-amber-500">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="text-[10px] uppercase font-bold text-amber-500 tracking-widest">${item.segment}</span>
                                <h3 class="text-xl font-bold text-white mt-1">${item.name}</h3>
                                <p class="text-xs text-slate-400 mt-1">${item.institute}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-3xl font-black text-amber-500">${item.position || 'N/A'}</div>
                                <p class="text-[10px] uppercase text-slate-600 font-bold">Rank</p>
                            </div>
                        </div>
                        ${btnArea}
                    </div>
                `;
            });
        }

        async function generate(idx, targetName, type) {
            const overlay = document.getElementById('downloadOverlay');
            overlay.style.display = 'flex';

            const myData = allParticipants.filter(p => String(p.phone).trim() === String(userPhone).trim());
            const item = myData[idx];

            document.getElementById('out-name').innerText = targetName;
            document.getElementById('id-zone').innerText = `ID: ${item.phone}`;

            const orgs = `<span class="b">মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটি</span>`;
            const event = `<span class="b">"ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬"</span>`;
            const rank = `<span class="highlight">${item.mark} নম্বর</span> ও <span class="highlight">${item.position} স্থান</span>`;

            let bodyContent = "";
            
            if (type === 'general') {
                bodyContent = `প্রত্যয়ন করা যাইতেছে যে, ${orgs} এর যৌথ উদ্যোগে আয়োজিত ${event} এ <span class="b">${item.segment}</span> সেগমেন্টে অংশগ্রহণ করিয়া এই শিক্ষার্থী ${rank} অর্জন করিয়াছেন। তাহার এই অংশগ্রহণ, কৃতিত্ব ও অসামান্য অবদানের জন্য ${orgs} ধন্যবাদ ও কৃতজ্ঞতা জ্ঞাপন করছে ও আগামী জীবনের সুস্বাস্থ্য ও সাফল্য কামনা করছে।`;
            } else if (type === 'inst') {
                bodyContent = `প্রত্যয়ন করা যাইতেছে যে, ${orgs} এর যৌথ উদ্যোগে আয়োজিত ${event} এ উক্ত প্রতিষ্ঠানের কৃতি শিক্ষার্থীগণ অংশগ্রহণ করিয়াছিলেন এবং তাহারা ${rank} অর্জন করিয়াছেন। উক্ত প্রতিষ্ঠানের শিক্ষার্থীদের এই অংশগ্রহণ, কৃতিত্ব ও অসামান্য অবদানের জন্য ${orgs} ধন্যবাদ ও কৃতজ্ঞতা জ্ঞাপন করছে ও অংশগ্রহণকারীদের আগামী জীবনের সুস্বাস্থ্য ও সাফল্য কামনা করছে। পাশাপাশি <span class="b">${item.institute}</span> কেও ধন্যবাদ জানাচ্ছে শিক্ষার্থীদের অংশগ্রহণের সুযোগ করে দেওয়ার জন্য একই সাথে উক্ত প্রতিষ্ঠানের অদূর ভবিষ্যতের সাফল্য কামনা করছে।`;
            } else if (type === 'personal_graffiti') {
                bodyContent = `প্রত্যয়ন করা যাইতেছে যে, ${orgs} এর যৌথ উদ্যোগে আয়োজিত ${event} এ <span class="b">${item.segment}</span> সেগমেন্টে অংশগ্রহণ করিয়া উপরিউক্ত ব্যক্তি ও তাহার অন্যান্য সহযোগীরা ${rank} অর্জন করিয়াছেন। তাহাদের এই অংশগ্রহণ, কৃতিত্ব ও অসামান্য অবদানের জন্য ${orgs} ধন্যবাদ ও কৃতজ্ঞতা জ্ঞাপন করছে ও আগামী জীবনের সুস্বাস্থ্য ও সাফল্য কামনা করছে।`;
            }

            document.getElementById('out-body').innerHTML = bodyContent;

            try {
                await new Promise(r => setTimeout(r, 600));
                const canvas = await html2canvas(document.getElementById('certificate-canvas'), { 
                    scale: 1, 
                    useCORS: true,
                    logging: false 
                });
                const pdf = new jspdf.jsPDF({ orientation: 'l', unit: 'in', format: [29, 21] });
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 29, 21);
                pdf.save(`Inquilab_26_Certificate_${targetName}.pdf`);
            } catch (err) {
                alert("ত্রুটি দেখা দিয়েছে। পুনরায় চেষ্টা করুন।");
            } finally {
                overlay.style.display = 'none';
            }
        }

        function logout() { localStorage.removeItem('userPhone'); window.location.replace('signup.html'); }
    </script>
</body>
</html>
