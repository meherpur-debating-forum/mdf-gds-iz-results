<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল কার্ড | ইনকিলাব জিন্দাবাদ ২০২৬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: #f1f5f9; }
        
        .result-container {
            background: #1e293b;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* সার্টিফিকেট তৈরির জন্য লুকানো লেআউট (হাই রেজোলিউশন নিশ্চিত করতে) */
        #cert-hidden-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }

        #certificate-canvas {
            width: 1123px; /* A4 Landscape width */
            height: 794px; /* A4 Landscape height */
            background: white;
            position: relative;
            color: #000000;
        }

        /* ফন্ট এবং অ্যালাইনমেন্ট সেটিংস */
        .cert-name-text {
            font-size: 52px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 25px;
            font-family: 'Hind Siliguri', sans-serif;
        }

        .cert-body-text {
            font-size: 22px;
            line-height: 1.7;
            color: #000000;
            font-family: 'Hind Siliguri', sans-serif;
            text-align: center;
            padding-left: 180px;
            padding-right: 180px;
            font-weight: 500;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <!-- ফলাফল কার্ড ভিউ -->
    <div id="capture-area" class="result-container p-8 md:p-12 rounded-3xl max-w-2xl w-full mt-10">
        <div class="text-center border-b border-slate-700 pb-8 mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-amber-400 mb-2">ইনকিলাব জিন্দাবাদ ২০২৬</h1>
            <p class="text-slate-400 font-medium italic">জাতীয় জাগরণ প্রতিযোগিতা - ফলাফল</p>
        </div>

        <div id="results-list" class="space-y-12">
            <!-- Data will load here -->
        </div>

        <div class="mt-16 pt-8 border-t border-slate-700">
            <p class="text-[12px] text-slate-500 text-center italic font-medium">
                অফিসিয়াল সার্টিফিকেট ডাউনলোডের জন্য নিচের বাটনটি ব্যবহার করুন।
            </p>
        </div>
    </div>

    <!-- কন্ট্রোল বাটনসমূহ -->
    <div class="mt-10 flex flex-wrap justify-center gap-4 w-full max-w-2xl mb-20">
        <button onclick="downloadAsCertificate('png')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-4 rounded-2xl shadow-lg transition">🖼️ সেভ এস ইমেজ (PNG)</button>
        <button onclick="downloadAsCertificate('pdf')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition">📄 সেভ এস পিডিএফ (PDF)</button>
        <a href="index.html" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl text-center flex items-center justify-center transition">🏠 হোম</a>
    </div>

    <!-- লুকানো সার্টিফিকেট ইঞ্জিন -->
    <div id="cert-hidden-container">
        <div id="certificate-canvas">
            <!-- আপনার দেওয়া অরিজিনাল ব্যাকগ্রাউন্ড লিঙ্ক -->
            <img id="bg-img-cert" src="https://i.postimg.cc/Q9JhYDYD/1000065970.png" 
                 class="absolute inset-0 w-full h-full object-cover" 
                 crossOrigin="anonymous">
            
            <div class="absolute inset-0 flex flex-col items-center justify-center pt-[100px]">
                <!-- নাম এলাকা -->
                <h1 id="out-name" class="cert-name-text">নাম লোড হচ্ছে...</h1>
                
                <!-- বয়ান এলাকা -->
                <p id="out-body" class="cert-body-text">
                    সার্টিফিকেট বয়ান প্রসেস হচ্ছে...
                </p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const phone = localStorage.getItem('userPhone');
        const userResults = allParticipants.filter(p => p.phone === phone);
        const list = document.getElementById('results-list');

        if (userResults.length > 0) {
            userResults.forEach((user, index) => {
                const segmentComps = allParticipants.filter(p => p.segment === user.segment).sort((a,b) => b.mark - a.mark);
                const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;
                
                list.innerHTML += `
                    <div class="${index > 0 ? 'border-t border-dashed border-slate-700 pt-10' : ''}">
                        <div class="grid grid-cols-1 gap-y-4">
                            <div class="flex justify-between border-b border-slate-800 pb-1">
                                <span class="text-slate-400">অংশগ্রহণকারী:</span>
                                <span class="text-white font-bold">${user.name}</span>
                            </div>
                            <div class="flex justify-between border-b border-slate-800 pb-1">
                                <span class="text-slate-400">সেগমেন্ট:</span>
                                <span class="text-amber-400 font-bold">${user.segment}</span>
                            </div>
                        </div>
                        <div class="mt-6 bg-slate-800/50 p-4 rounded-xl text-center">
                            <span class="text-2xl font-bold text-amber-500">অবস্থান: ${pos} তম</span>
                        </div>
                    </div>`;
            });
        } else {
            window.location.href = 'signup.html';
        }

        async function downloadAsCertificate(type) {
            if (userResults.length === 0) return;
            
            const user = userResults[0]; 
            const segmentComps = allParticipants.filter(p => p.segment === user.segment).sort((a,b) => b.mark - a.mark);
            const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;

            // টেক্সট বসানো
            document.getElementById('out-name').innerText = user.name;
            const body = document.getElementById('out-body');
            
            if (user.segment.includes("গ্রাফিতি")) {
                body.innerHTML = `এত দ্বারা প্রত্যয়ন করা হইতেসে যে, মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটির যৌথ উদ্যোগে আয়োজিত ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬ এ গ্রাফিতি অঙ্কন সেগমেন্টে উক্ত প্রতিষ্ঠানের কৃতি শিক্ষার্থী গণ (${user.name}) অংশগ্রহণ করিয়াছিলেন। তাহাদিগের এই অসামান্য অবদানের জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো যাইতেসে যে তাহারা ${user.mark} মার্ক অর্জনের সহিত ${pos} তম স্থান অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য জেন-জি ডিবেটিং সোসাইটি ও মেহেরপুর ডিবেটিং ফোরাম গর্বিত ও তাহার আগামী জীবনের সাফল্য কামনা করে।`;
            } else {
                body.innerHTML = `এত দ্বারা প্রত্যয়ন করা হইতেছে যে, মেহেরপুর ডিবেটিং ফোরাম ও জেন-জি ডিবেটিং সোসাইটির যৌথ উদ্যোগে আয়োজিত ইনকিলাব জিন্দাবাদ: জাতীয় জাগরণ প্রতিযোগিতা ২০২৬ এ "${user.segment} সেগমেন্টে" "${user.institute} হইতে" উক্ত কৃতি শিক্ষার্থী অংশগ্রহণ করিয়াছিলো। তাহার অসামান্য অবদান এর জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো হইতেছে যে তিনি উক্ত সেগমেন্টে ${user.mark} মার্ক অর্জনের সহিত ${pos} তম অবস্থান অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য জেন-জি ডিবেটিং সোসাইটি ও মেহেরপুর ডিবেটিং ফোরাম গর্বিত ও তাহার আগামী জীবনের সাফল্য কামনা করে।`;
            }

            // ইমেজের কোয়ালিটি নিশ্চিত করতে হাই স্কেল ব্যবহার
            const canvas = await html2canvas(document.getElementById('certificate-canvas'), { 
                scale: 4, 
                useCORS: true,
                allowTaint: false,
                backgroundColor: "#ffffff"
            });

            if (type === 'png') {
                const link = document.createElement('a');
                link.download = `Inqilab26_Certificate_${user.name}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            } else {
                const imgData = canvas.toDataURL('image/png', 1.0);
                const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Inqilab26_Certificate_${user.name}.pdf`);
            }
        }
    </script>
</body>
</html>
