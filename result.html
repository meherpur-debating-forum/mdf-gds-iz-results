<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল ও সনদপত্র | ইনকিলাব জিন্দাবাদ ২০২৬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: #f1f5f9; }
        
        #cert-hidden-container {
            position: absolute;
            left: -9999px;
            top: 0;
        }

        #certificate-canvas {
            width: 2784px; 
            height: 2016px; 
            background: white;
            position: relative;
            overflow: hidden;
        }

        #writing-zone {
            position: absolute;
            top: 490px;    /* নাম আরও উপরে তোলা হয়েছে */
            bottom: 595.2px; 
            left: 172.8px;   
            right: 700.8px;  
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        .cert-name-final {
            font-size: 140px; /* ফন্ট সাইজ আরও ১ ধাপ বাড়ানো হয়েছে */
            font-weight: 800;
            color: #000000;
            margin-bottom: 70px;
            text-align: center;
            line-height: 1.1;
        }

        .cert-body-final {
            font-size: 50px; /* ফন্ট সাইজ আরও ১ ধাপ বাড়ানো হয়েছে */
            line-height: 1.9;
            color: #000000;
            text-align: center;
            font-weight: 500;
            max-width: 2000px;
        }

        .b { font-weight: 800; } /* বোল্ড করার জন্য কাস্টম ক্লাস */

        .ui-card { background: #1e293b; border: 1px solid #334155; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #334155; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="ui-card p-6 md:p-10 rounded-3xl max-w-2xl w-full mt-6 shadow-2xl">
        <div class="text-center border-b border-slate-700 pb-6 mb-6">
            <h1 class="text-2xl font-bold text-amber-400 mb-1">ইনকিলাব জিন্দাবাদ ২০২৬</h1>
            <p class="text-slate-400 text-sm">ফলাফল ও সনদপত্র ডাউনলোড পোর্টাল</p>
        </div>

        <!-- রেজাল্ট লিস্ট -->
        <div id="status-box" class="space-y-6">
            <div class="text-center text-slate-500 py-10 italic">তথ্য লোড হচ্ছে...</div>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-slate-400 hover:text-white text-sm transition underline">অন্য নম্বর দিয়ে চেক করুন</a>
        </div>
    </div>

    <!-- সুনির্দিষ্ট মেজারমেন্ট ইঞ্জিন (২৯x২১ ইঞ্চি) -->
    <div id="cert-hidden-container">
        <div id="certificate-canvas">
            <img src="https://meherpur-debating-forum.github.io/mdf-gds-iz-results/Black%20and%20White%20Simple%20Page%20Border%20A4_20260318_224236_0000.png" 
                 class="absolute inset-0 w-full h-full object-fill" 
                 crossOrigin="anonymous">
            
            <div id="writing-zone">
                <h1 id="out-name" class="cert-name-final">নাম/প্রতিষ্ঠান</h1>
                <div id="out-body" class="cert-body-final">
                    বর্ণনাংশ জেনারেট হচ্ছে...
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const phone = localStorage.getItem('userPhone');
        const userResults = allParticipants.filter(p => p.phone === phone);
        const statusBox = document.getElementById('status-box');

        if (userResults.length > 0) {
            statusBox.innerHTML = '';
            
            userResults.forEach((user, index) => {
                const segmentComps = allParticipants
                    .filter(p => p.segment === user.segment)
                    .sort((a,b) => b.mark - a.mark);
                
                const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;
                
                statusBox.innerHTML += `
                    <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50 relative">
                        <div class="absolute top-4 right-4 bg-amber-500 text-slate-900 text-xs font-bold px-3 py-1 rounded-full">
                            ${pos} তম স্থান
                        </div>
                        
                        <div class="space-y-2 mb-6">
                            <div class="data-row"><span class="text-slate-400 text-sm">অংশগ্রহণকারী:</span><span class="text-white font-bold">${user.name}</span></div>
                            <div class="data-row"><span class="text-slate-400 text-sm">বিভাগ:</span><span class="text-amber-400 font-bold">${user.segment}</span></div>
                            <div class="data-row"><span class="text-slate-400 text-sm">প্রতিষ্ঠান:</span><span class="text-white font-semibold">${user.institute || 'N/A'}</span></div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="downloadCert(${index}, 'png')" id="png-${index}" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-xl text-xs transition">🖼️ PNG ডাউনলোড</button>
                            <button onclick="downloadCert(${index}, 'pdf')" id="pdf-${index}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-xs transition">📄 PDF ডাউনলোড</button>
                        </div>
                    </div>`;
            });
        } else {
            statusBox.innerHTML = `<p class="text-center text-red-400 py-10">কোনো ডাটা পাওয়া যায়নি।</p>`;
        }

        async function downloadCert(idx, type) {
            const user = userResults[idx];
            const segmentComps = allParticipants.filter(p => p.segment === user.segment).sort((a,b) => b.mark - a.mark);
            const pos = segmentComps.findIndex(p => p.phone === user.phone && p.name === user.name) + 1;

            const btn = document.getElementById(`${type}-${idx}`);
            const oldTxt = btn.innerText;
            btn.innerText = "অপেক্ষা করুন...";
            btn.disabled = true;

            const nameEl = document.getElementById('out-name');
            const bodyDiv = document.getElementById('out-body');
            
            // বোল্ড ফরম্যাটিং (কোটেশন ছাড়া)
            const mdf = `<span class="b">মেহেরপুর ডিবেটিং ফোরাম</span>`;
            const gds = `<span class="b">জেন-জি ডিবেটিং সোসাইটি</span>`;
            const event = `<span class="b">ইনকিলাব জিন্দাবাদ : জাতীয় জাগরণ প্রতিযোগিতা ২০২৬</span>`;
            const inst = `<span class="b">${user.institute || 'উক্ত প্রতিষ্ঠান'}</span>`;
            const marks = `<span class="b">${user.mark} মার্ক</span>`;
            const position = `<span class="b">${pos} তম অবস্থান</span>`;
            const segment = `<span class="b">${user.segment} সেগমেন্টে</span>`;

            // গ্রাফিতি হলে নামের জায়গায় জাস্ট প্রতিষ্ঠানের নাম
            if (user.segment.includes("গ্রাফিতি")) {
                nameEl.innerText = user.institute || "উক্ত প্রতিষ্ঠান";
                bodyDiv.innerHTML = `এত দ্বারা প্রত্যয়ন করা হইতেসে যে, ${mdf} ও ${gds} এর যৌথ উদ্যোগে আয়োজিত ${event} এ গ্রাফিতি অঙ্কন সেগমেন্টে উক্ত প্রতিষ্ঠানের কৃতি শিক্ষার্থী গণ অংশগ্রহণ করিয়াছিলেন। তাহাদিগের এই অসামান্য অবদানের জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো যাইতেসে যে তাহারা ${marks} অর্জনের সহিত ${position} অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য ${gds} ও ${mdf} গর্বিত ও তাহার আগামী জীবনের সাফল্য কামনা করে।`;
            } else {
                nameEl.innerText = user.name;
                bodyDiv.innerHTML = `এত দ্বারা প্রত্যয়ন করা হইতেছে যে, ${mdf} ও ${gds} এর যৌথ উদ্যোগে আয়োজিত ${event} এ ${segment} ${inst} হইতে উক্ত কৃতি শিক্ষার্থী অংশগ্রহণ করিয়াছিলো। তাহার অসামান্য অবদান এর জন্য ধন্যবাদ জ্ঞাপনের সহিত জানানো হইতেছে যে তিনি উক্ত সেগমেন্টে ${marks} অর্জনের সহিত ${position} অধিকার করিয়াছেন। তাহার এই কৃতিত্বের জন্য ${gds} ও ${mdf} গর্বিত ও তাহার আগামী জীবনের সাফল্য কামনা করে।`;
            }

            await new Promise(r => setTimeout(r, 800));

            try {
                const canvas = await html2canvas(document.getElementById('certificate-canvas'), { 
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: "#ffffff"
                });

                if (type === 'png') {
                    const link = document.createElement('a');
                    link.download = `Certificate_${user.name}.png`;
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.click();
                } else {
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdf = new jspdf.jsPDF({ orientation: 'l', unit: 'in', format: [29, 21] });
                    pdf.addImage(imgData, 'JPEG', 0, 0, 29, 21);
                    pdf.save(`Certificate_${user.name}.pdf`);
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerText = oldTxt;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
