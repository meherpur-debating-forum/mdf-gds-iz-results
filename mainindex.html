<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মেমোরি ও লিডারবোর্ড</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #fbbf24;
            --bg-deep: #020617;
            --gold: #d4af37;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* প্রি-লোডার স্টাইল */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-bar {
            width: 220px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
        }

        #progressLine {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease;
        }

        /* স্টেজ কন্ট্রোল */
        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: var(--bg-deep);
            transition: all 0.6s ease;
        }

        .hidden-stage {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
            display: none !important;
        }

        /* এনিমেশন ও টেক্সট ইফেক্ট */
        .hero-text {
            font-size: 2.5rem;
            font-weight: 900;
            transition: all 0.6s ease;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            word-wrap: break-word;
            max-width: 90%;
        }
        .hero-text.active { opacity: 1; transform: translateY(0); }
        .hero-text.shifted {
            font-size: 1.5rem;
            transform: translateY(-20px);
            color: var(--primary);
        }

        .segment-announcer {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
        }
        .segment-announcer.active { opacity: 1; transform: scale(1); }

        .media-container {
            width: 85vw;
            max-width: 380px;
            aspect-ratio: 1/1;
            border: 3px solid var(--gold);
            border-radius: 1.2rem;
            background: #000;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s ease;
            margin-top: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .media-container.active { opacity: 1; transform: scale(1); }
        .media-content { width: 100%; height: 100%; object-fit: contain; }

        /* মেইন পোর্টাল ও কার্ড */
        #mainPortal {
            display: none;
            position: relative;
            z-index: 60;
            background: var(--bg-deep);
            min-height: 100vh;
            overflow-y: auto;
        }
        #mainPortal.active-portal { display: block; }

        .segment-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .segment-header {
            background: rgba(251, 191, 36, 0.1);
            padding: 1rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(251, 191, 36, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ১. প্রি-লোডার -->
    <div id="preloader">
        <img src="iz-logo.jpg" class="w-24 rounded-2xl mb-6 animate-pulse" alt="Logo">
        <div id="loaderStatus" class="text-[10px] uppercase tracking-[0.4em] text-amber-500 font-bold">সার্টিফিকেট ও ডেটা লোড হচ্ছে...</div>
        <div class="loader-bar">
            <div id="progressLine"></div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="bg.mp3" type="audio/mpeg"></audio>

    <!-- ২. শুরু করার স্টেজ -->
    <div id="startStage" class="stage hidden-stage">
        <div class="text-center">
            <h3 class="text-amber-500 font-bold tracking-widest text-xs mb-6 opacity-50 uppercase">National Inquilab 2026</h3>
            <button id="mainStartBtn" onclick="handleStart()" class="bg-amber-500 text-slate-900 font-black px-14 py-5 rounded-full text-xl shadow-[0_20px_50px_rgba(251,191,36,0.3)] hover:scale-105 active:scale-95 transition">
                স্মৃতি ও ফলাফল 📸
            </button>
        </div>
    </div>

    <!-- ৩. লোগো স্টেজ -->
    <div id="logoStage" class="stage hidden-stage">
        <img src="iz-logo.jpg" class="w-40 rounded-[2rem] shadow-2xl" alt="IZ Logo">
    </div>

    <!-- ৪. মেমোরি শোকেস -->
    <div id="memoryStage" class="stage hidden-stage">
        <div id="segAnnounce" class="segment-announcer"></div>

        <div id="winnerWrapper" class="flex flex-col items-center justify-center w-full hidden">
            <h1 id="mainTitle" class="hero-text text-white px-6"></h1>
            <div id="detailBox" class="detail-box opacity-0 transition-all duration-500 text-center mt-2">
                <p id="detInst" class="text-slate-400 font-medium text-sm"></p>
                <div id="detRank" class="bg-amber-500/20 text-amber-500 px-4 py-1 rounded-full text-[10px] font-bold inline-block border border-amber-500/30 mt-2 uppercase"></div>
            </div>

            <div id="mediaBox" class="media-container">
                <div id="mediaSpinner" class="spinner absolute z-10 hidden"></div>
                <img id="displayImg" class="media-content hidden" src="">
                <video id="displayVid" class="media-content hidden" playsinline muted></video>
            </div>

            <button id="nextBtn" onclick="nextSlide()" class="mt-8 opacity-0 pointer-events-none transition-all duration-500 bg-white text-slate-900 px-10 py-3 rounded-full font-black text-sm uppercase tracking-widest">
                পরবর্তী ➔
            </button>
        </div>
    </div>

    <!-- ৫. মেইন পোর্টাল (ফলাফল তালিকা) -->
    <div id="mainPortal" class="px-5 py-12">
        <div class="max-w-md mx-auto">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-white leading-tight">বিজয়ী <span class="text-amber-500">তালিকা</span></h1>
                <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest">Inquilab 26 Recognition</p>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-10">
                <a href="full-result.pdf" target="_blank" class="bg-slate-800/50 p-4 rounded-2xl text-center border border-white/5 hover:border-amber-500/30 transition">
                    <span class="block text-xl mb-1">📄</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">PDF Result</span>
                </a>
                <a href="signup.html" class="bg-amber-500 p-4 rounded-2xl text-center shadow-lg shadow-amber-500/10 transition">
                    <span class="block text-xl mb-1">🎓</span>
                    <span class="text-[10px] font-bold text-slate-900 uppercase">Certificate</span>
                </a>
            </div>

            <div id="tableContainer"></div>
            
            <button onclick="restartExperience()" class="w-full mt-10 py-6 border-t border-white/5 text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] hover:text-amber-500 transition">
                🎞️ রি-মেমোরাইজ
            </button>
        </div>
    </div>

    <!-- কাজ দেখার পপআপ -->
    <div id="mediaPopup" class="fixed inset-0 bg-black/95 z-[500] hidden items-center justify-center p-5" onclick="this.style.display='none'">
        <div class="max-w-sm w-full" onclick="event.stopPropagation()">
            <div id="popupContent" class="bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>
            <p class="text-center text-slate-500 text-[10px] mt-4 uppercase tracking-widest">ট্যাপ করে বন্ধ করুন</p>
        </div>
    </div>

    <!-- ডেটা ইম্পোর্ট -->
    <script src="data.js"></script>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        let timeline = [];
        let currentIndex = 0;

        // ডেটা চেক করার লজিক (data.js বড় হলে এটা জরুরি)
        function isDataReady() {
            return (typeof allParticipants !== 'undefined' && Array.isArray(allParticipants) && allParticipants.length > 0);
        }

        // ১. প্রি-লোডার হ্যান্ডলার
        function initLoader() {
            const progressLine = document.getElementById('progressLine');
            let progress = 0;
            
            const loadInterval = setInterval(() => {
                if (isDataReady()) {
                    progress = 100;
                    progressLine.style.width = '100%';
                    clearInterval(loadInterval);
                    
                    setTimeout(() => {
                        document.getElementById('preloader').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('preloader').style.display = 'none';
                            document.getElementById('startStage').classList.remove('hidden-stage');
                        }, 800);
                    }, 600);
                } else {
                    progress += 2;
                    if (progress > 95) progress = 95; // ডেটা না পাওয়া পর্যন্ত ৯৫% এ আটকে থাকবে
                    progressLine.style.width = progress + '%';
                }
            }, 50);
        }

        // ২. টাইমলাইন প্রিপারেশন (৩ -> ২ -> ১ রিভার্স পজিশন)
        function prepareTimeline() {
            const segments = ["কবিতা লিখন", "গ্রাফিতি", "চিত্রাঙ্কন", "বারোয়ারী বিতর্ক"];
            const codes = { "কবিতা লিখন":"p", "গ্রাফিতি":"g", "চিত্রাঙ্কন":"a", "বারোয়ারী বিতর্ক":"b" };
            timeline = [];
            
            segments.forEach(seg => {
                const winners = allParticipants
                    .filter(p => p.segment === seg && (p.position == "1" || p.position == "2" || p.position == "3"))
                    .sort((a, b) => parseInt(b.position) - parseInt(a.position)); // ৩, ২, ১ সর্টিং
                
                if (winners.length > 0) {
                    timeline.push({ type: 'segment', name: seg });
                    winners.forEach(w => {
                        timeline.push({ type: 'winner', data: { ...w, code: codes[seg] } });
                    });
                }
            });
        }

        // ৩. এক্সপেরিয়েন্স শুরু
        function handleStart() {
            bgMusic.play().catch(e => console.log("Audio play failed"));
            prepareTimeline();
            
            if (localStorage.getItem('inquilab_visited')) {
                showPortal();
            } else {
                startSequence();
            }
        }

        function startSequence() {
            document.getElementById('startStage').classList.add('hidden-stage');
            setTimeout(() => {
                document.getElementById('logoStage').classList.remove('hidden-stage');
                setTimeout(() => {
                    document.getElementById('logoStage').classList.add('hidden-stage');
                    setTimeout(() => {
                        document.getElementById('memoryStage').classList.remove('hidden-stage');
                        renderStep();
                    }, 600);
                }, 1800);
            }, 400);
        }

        // ৪. মেমোরি রেন্ডারিং
        function renderStep() {
            if (currentIndex >= timeline.length) {
                localStorage.setItem('inquilab_visited', 'true');
                showPortal();
                return;
            }

            const step = timeline[currentIndex];
            const segAnn = document.getElementById('segAnnounce');
            const winWrap = document.getElementById('winnerWrapper');

            if (step.type === 'segment') {
                winWrap.classList.add('hidden');
                segAnn.innerText = step.name;
                segAnn.classList.add('active');
                setTimeout(() => {
                    segAnn.classList.remove('active');
                    setTimeout(() => { currentIndex++; renderStep(); }, 600);
                }, 2000);
            } else {
                segAnn.classList.remove('active');
                winWrap.classList.remove('hidden');
                displayWinner(step.data);
            }
        }

        async function displayWinner(item) {
            const title = document.getElementById('mainTitle');
            const detBox = document.getElementById('detailBox');
            const mediaBox = document.getElementById('mediaBox');
            const nextBtn = document.getElementById('nextBtn');
            const img = document.getElementById('displayImg');
            const vid = document.getElementById('displayVid');
            const spinner = document.getElementById('mediaSpinner');

            // রিসেট UI
            title.innerText = (item.segment === "গ্রাফিতি") ? item.institute : item.name;
            document.getElementById('detInst').innerText = (item.segment === "গ্রাফিতি") ? `দল: ${item.name}` : item.institute;
            document.getElementById('detRank').innerText = `${item.position} তম স্থান | ${item.segment}`;
            
            title.className = "hero-text text-white px-6 active";
            detBox.style.opacity = '0';
            mediaBox.classList.remove('active');
            nextBtn.style.opacity = '0';
            nextBtn.style.pointerEvents = 'none';
            img.classList.add('hidden');
            vid.classList.add('hidden');
            spinner.classList.remove('hidden');
            bgMusic.volume = 1.0;

            setTimeout(() => {
                title.classList.add('shifted');
                detBox.style.opacity = '1';
                setTimeout(async () => {
                    mediaBox.classList.add('active');
                    const fileName = `${item.code}${item.position}`;
                    
                    if (item.code === 'b') {
                        bgMusic.volume = 0.1;
                        vid.classList.remove('hidden');
                        vid.src = `${fileName}.mp4`;
                        vid.play().catch(e => console.log("Video play error"));
                    } else {
                        img.classList.remove('hidden');
                        img.src = `${fileName}.jpg`;
                    }
                    
                    spinner.classList.add('hidden');
                    nextBtn.style.opacity = '1';
                    nextBtn.style.pointerEvents = 'auto';
                }, 800);
            }, 2000);
        }

        function nextSlide() { currentIndex++; renderStep(); }

        // ৫. পোর্টাল ভিউ
        function showPortal() {
            document.querySelectorAll('.stage').forEach(s => s.classList.add('hidden-stage'));
            const portal = document.getElementById('mainPortal');
            portal.classList.add('active-portal');
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '';
            const segments = ["কবিতা লিখন", "গ্রাফিতি", "চিত্রাঙ্কন", "বারোয়ারী বিতর্ক"];
            const codes = { "কবিতা লিখন":"p", "গ্রাফিতি":"g", "চিত্রাঙ্কন":"a", "বারোয়ারী বিতর্ক":"b" };

            segments.forEach(seg => {
                const winners = allParticipants
                    .filter(p => p.segment === seg && (p.position == "1" || p.position == "2" || p.position == "3"))
                    .sort((a, b) => parseInt(a.position) - parseInt(b.position));

                if(winners.length > 0) {
                    let html = `<div class="segment-card"><div class="segment-header">${seg}</div><table class="w-full text-left">`;
                    winners.forEach(w => {
                        html += `
                        <tr class="border-t border-white/5">
                            <td class="p-4">
                                <div class="text-sm font-bold text-slate-200">${w.name}</div>
                                <div class="text-[10px] text-slate-500 uppercase">${w.institute}</div>
                            </td>
                            <td class="p-4 text-center">
                                <span class="text-xs font-black text-amber-500">${w.position}তম</span>
                            </td>
                            <td class="p-4 text-right">
                                <button onclick="viewWork('${codes[seg]}', '${w.position}')" class="bg-amber-500 text-slate-900 text-[10px] font-bold py-2 px-3 rounded-lg uppercase">কাজ</button>
                            </td>
                        </tr>`;
                    });
                    html += `</table></div>`;
                    container.innerHTML += html;
                }
            });
        }

        function viewWork(code, pos) {
            const popup = document.getElementById('mediaPopup');
            const container = document.getElementById('popupContent');
            popup.style.display = 'flex';
            const file = `${code}${pos}`;
            if(code === 'b') {
                container.innerHTML = `<video src="${file}.mp4" controls autoplay class="w-full"></video>`;
            } else {
                container.innerHTML = `<img src="${file}.jpg" class="w-full">`;
            }
        }

        function restartExperience() {
            localStorage.removeItem('inquilab_visited');
            location.reload();
        }

        window.onload = initLoader;
    </script>
</body>
</html>
