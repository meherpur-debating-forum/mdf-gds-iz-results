<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ডাটা এডিটর</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #020617;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }
        input, select { font-size: 16px !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-24">

    <!-- পাসওয়ার্ড স্ক্রিন -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass-card p-8 rounded-[2.5rem] text-center border-amber-500/20 shadow-2xl">
            <div class="w-16 h-16 bg-amber-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="key-round" class="text-amber-500 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">পাসওয়ার্ড দিন</h1>
            <input type="password" id="password" 
                   class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center text-2xl tracking-[10px] text-amber-500 focus:border-amber-500 outline-none mb-6" 
                   placeholder="••••" autofocus>
            <button onclick="checkAuth()" class="w-full bg-amber-500 text-slate-950 font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                ড্যাশবোর্ডে প্রবেশ
            </button>
        </div>
    </div>

    <!-- মেইন ড্যাশবোর্ড -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-500 max-w-6xl mx-auto p-4">
        
        <header class="flex items-center justify-between mb-8 px-2 pt-4">
            <div>
                <h2 class="text-2xl font-black text-white">ইনকিলাব <span class="text-amber-500">২৬</span></h2>
                <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Real-time Data Editor</p>
            </div>
            <div class="flex gap-2">
                <button onclick="copyCode()" class="bg-amber-500/10 text-amber-500 p-3 rounded-xl border border-amber-500/20">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- বাম পাশ: ইনপুট ফর্ম -->
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-6 rounded-[2rem] shadow-xl">
                    <h3 class="font-bold text-amber-500 flex items-center gap-2 mb-6">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> নতুন প্রতিযোগী
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">বিভাগ</label>
                            <select id="segment" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none">
                                <option>কবিতা লিখন</option>
                                <option>চিত্রাঙ্কন</option>
                                <option>বারোয়ারী বিতর্ক</option>
                                <option>গ্রাফিতি</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">নাম / নামসমূহ</label>
                            <input type="text" id="name" placeholder="নাম লিখুন" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">ফোন নম্বর</label>
                            <input type="tel" id="phone" placeholder="01XXXXXXXXX" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">প্রতিষ্ঠান</label>
                            <input type="text" id="institute" placeholder="স্কুল/কলেজের নাম" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">মার্কস</label>
                                <input type="text" id="mark" placeholder="৯৫" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">পজিশন</label>
                                <input type="text" id="position" placeholder="১" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none">
                            </div>
                        </div>
                        <button onclick="addItem()" class="w-full bg-white text-slate-950 font-bold py-4 rounded-2xl hover:bg-amber-500 transition active:scale-95 mt-2 shadow-lg shadow-white/5">
                            লিস্টে যুক্ত করুন
                        </button>
                    </div>
                </div>
            </div>

            <!-- মাঝখান: তালিকা -->
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-6 rounded-[2rem] shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-bold text-slate-300 flex items-center gap-2">
                            <i data-lucide="list" class="w-5 h-5 text-amber-500"></i> ডাটা লিস্ট
                        </h3>
                        <select id="filterSeg" onchange="renderList()" class="bg-slate-800 text-[10px] font-bold rounded-lg px-2 py-1 outline-none">
                            <option value="All">সব বিভাগ</option>
                            <option>কবিতা লিখন</option>
                            <option>চিত্রাঙ্কন</option>
                            <option>বারোয়ারী বিতর্ক</option>
                            <option>গ্রাফিতি</option>
                        </select>
                    </div>
                    <div id="list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Items rendered here -->
                    </div>
                </div>
            </div>

            <!-- ডান পাশ: কোড প্রিভিউ -->
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl flex flex-col h-full min-h-[400px]">
                    <div class="bg-slate-800/50 p-4 border-b border-slate-700 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">data.js কোড</span>
                        <button onclick="copyCode()" class="text-[10px] bg-amber-500 text-slate-950 font-bold px-3 py-1 rounded-md">কপি</button>
                    </div>
                    <div class="p-4 bg-black/40 flex-grow relative">
                        <pre id="code-output" class="text-[10px] text-emerald-400 font-mono whitespace-pre-wrap break-all custom-scrollbar overflow-y-auto absolute inset-4"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ডাটা লোড করার স্ক্রিপ্ট -->
    <script src="data.js"></script>
    <script>
        const ADMIN_PASS = ".";

        // স্ক্রিপ্ট চেক: data.js লোড হয়েছে কিনা
        window.onload = () => {
            if (typeof allParticipants === 'undefined') {
                console.error("data.js লোড হয়নি বা allParticipants পাওয়া যায়নি!");
                // ফলব্যাক হিসেবে খালি অ্যারে
                window.allParticipants = [];
            }
        }

        function checkAuth() {
            const p = document.getElementById('password').value;
            if(p === ADMIN_PASS) {
                document.getElementById('auth-overlay').style.display = 'none';
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
                lucide.createIcons();
                updateDisplay();
            } else {
                alert("ভুল পাসওয়ার্ড!");
                document.getElementById('password').value = "";
            }
        }

        function addItem() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const institute = document.getElementById('institute').value.trim();
            const segment = document.getElementById('segment').value;
            const mark = document.getElementById('mark').value.trim();
            const position = document.getElementById('position').value.trim();

            if(!name || !phone) return alert("নাম ও ফোন আবশ্যক!");

            const newItem = { name, phone, institute, segment, mark, position };
            allParticipants.unshift(newItem); // নতুনটা উপরে থাকবে
            
            updateDisplay();
            
            // ফিল্ড রিসেট
            document.getElementById('name').value = "";
            document.getElementById('phone').value = "";
            document.getElementById('mark').value = "";
            document.getElementById('position').value = "";
        }

        function deleteItem(index) {
            if(confirm("মুছে ফেলতে চান?")) {
                allParticipants.splice(index, 1);
                updateDisplay();
            }
        }

        function updateDisplay() {
            renderList();
            // রিয়েল-টাইম কোড জেনারেশন
            const codeOutput = `const allParticipants = ${JSON.stringify(allParticipants, null, 4)};`;
            document.getElementById('code-output').innerText = codeOutput;
        }

        function renderList() {
            const container = document.getElementById('list');
            const filter = document.getElementById('filterSeg').value;
            container.innerHTML = "";

            allParticipants.forEach((item, index) => {
                if(filter !== "All" && item.segment !== filter) return;

                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-900/40 rounded-2xl border border-slate-800/50 hover:border-amber-500/30 transition";
                div.innerHTML = `
                    <div class="flex-1 overflow-hidden pr-2">
                        <div class="text-sm font-bold text-white truncate">${item.name}</div>
                        <div class="text-[10px] text-slate-500">${item.segment} • ${item.position || '-'} পজিশন</div>
                    </div>
                    <button onclick="deleteItem(${index})" class="p-2.5 text-rose-500 bg-rose-500/10 rounded-xl active:scale-75 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function copyCode() {
            const code = document.getElementById('code-output').innerText;
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = code;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand("copy");
            document.body.removeChild(tempTextArea);
            alert("সব ডাটা কপি হয়েছে! এবার data.js ফাইলে পেস্ট করে দিন।");
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });
    </script>
</body>
</html>
