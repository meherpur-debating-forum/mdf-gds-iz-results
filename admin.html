<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>এডিটর ড্যাশবোর্ড | Inquilab '26</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #020617;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }
        .code-font {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .search-focus:focus-within { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.1); }
        
        @media (min-width: 1024px) {
            .main-layout {
                display: grid;
                grid-template-columns: 320px 1fr 380px;
                gap: 1.5rem;
                height: calc(100vh - 120px);
            }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 lg:p-6">

    <!-- Auth Screen -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass-card p-8 rounded-[2.5rem] text-center border-amber-500/20 shadow-2xl">
            <div class="w-16 h-16 bg-amber-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="text-amber-500 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2 text-balance">পাসওয়ার্ড দিন</h1>
            <input type="password" id="password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center text-2xl tracking-[10px] text-amber-500 focus:border-amber-500 outline-none mb-6" placeholder="••••">
            <button onclick="checkAuth()" class="w-full bg-amber-500 text-slate-950 font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">প্রবেশ করুন</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-500 max-w-[1800px] mx-auto">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 px-2">
            <div>
                <h2 class="text-3xl font-black text-white">ইনকিলাব <span class="text-amber-500">২৬</span></h2>
                <div class="flex items-center gap-2 text-slate-500">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-[10px] uppercase font-bold tracking-widest">Live Result Editor</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="relative search-focus border border-slate-800 bg-slate-900/50 rounded-xl px-4 py-2.5 flex items-center gap-2 transition-all group">
                    <i data-lucide="search" class="w-4 h-4 text-slate-500 group-focus-within:text-amber-500"></i>
                    <input type="text" id="globalSearch" oninput="renderList()" placeholder="নাম, নম্বর বা স্কুল..." class="bg-transparent border-none outline-none text-sm w-40 md:w-64 text-white">
                </div>
                <button onclick="copyCode()" class="bg-amber-500 text-slate-950 px-6 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-amber-400 transition active:scale-95 shadow-lg shadow-amber-500/10">
                    <i data-lucide="copy" class="w-4 h-4"></i> ডাটা কপি করুন
                </button>
            </div>
        </header>

        <div class="main-layout flex flex-col gap-6">
            
            <!-- Left: Input Form -->
            <div class="w-full lg:h-full overflow-y-auto pr-1 custom-scrollbar">
                <div class="glass-card p-6 rounded-[2.5rem] border-amber-500/20">
                    <h3 id="form-title" class="font-bold text-amber-500 flex items-center gap-2 mb-6 text-lg">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> প্রতিযোগী যোগ করুন
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">সেগমেন্ট</label>
                            <select id="segment" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none text-sm">
                                <option>কবিতা লিখন</option>
                                <option>চিত্রাঙ্কন</option>
                                <option>বারোয়ারী বিতর্ক</option>
                                <option>গ্রাফিতি</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">নাম</label>
                            <input type="text" id="name" placeholder="নাম লিখুন" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">প্রতিষ্ঠান</label>
                            <input type="text" id="institute" placeholder="স্কুল/কলেজের নাম" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none text-sm">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">ফোন নম্বর</label>
                                <input type="tel" id="phone" placeholder="01XXXXXXXXX" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none text-sm">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">মার্কস</label>
                                    <input type="number" id="mark" placeholder="95" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none text-sm">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">র‍্যাংক</label>
                                    <input type="number" id="position" placeholder="1" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 focus:border-amber-500 outline-none text-sm">
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2 pt-4">
                            <button id="cancel-btn" onclick="cancelEdit()" class="hidden flex-1 bg-slate-800 text-slate-400 font-bold py-3.5 rounded-2xl text-xs transition">বাতিল</button>
                            <button id="save-btn" onclick="saveItem()" class="flex-[2] bg-white text-slate-950 font-bold py-3.5 rounded-2xl text-xs hover:bg-amber-500 transition shadow-lg">ডাটা সংরক্ষণ</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Middle: Live List View -->
            <div class="w-full lg:h-full flex flex-col gap-4">
                <div class="glass-card rounded-[2.5rem] flex flex-col h-full overflow-hidden border-slate-800/50">
                    <div class="p-6 border-b border-slate-800 flex flex-col xl:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-amber-500/10 rounded-lg text-amber-500">
                                <i data-lucide="layout-list" class="w-5 h-5"></i>
                            </div>
                            <h3 class="font-bold text-white uppercase tracking-wider text-sm">র‍্যাংক অনুযায়ী লাইভ প্রিভিউ</h3>
                        </div>
                        <div class="flex gap-1 bg-slate-950 p-1 rounded-xl border border-slate-800 overflow-x-auto max-w-full custom-scrollbar">
                            <button onclick="changeFilter('কবিতা লিখন')" id="btn-কবিতা" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-[10px] font-bold transition">কবিতা</button>
                            <button onclick="changeFilter('চিত্রাঙ্কন')" id="btn-চিত্রাঙ্কন" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-[10px] font-bold transition">চিত্রাঙ্কন</button>
                            <button onclick="changeFilter('বারোয়ারী বিতর্ক')" id="btn-বারোয়ারী" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-[10px] font-bold transition">বিতর্ক</button>
                            <button onclick="changeFilter('গ্রাফিতি')" id="btn-গ্রাফিতি" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-[10px] font-bold transition">গ্রাফিতি</button>
                        </div>
                    </div>
                    <div id="list" class="p-6 overflow-y-auto flex-grow custom-scrollbar space-y-3 pb-10">
                        <!-- Items list -->
                    </div>
                </div>
            </div>

            <!-- Right: Code Block View -->
            <div class="w-full lg:h-full flex flex-col gap-4">
                <div class="glass-card rounded-[2.5rem] overflow-hidden flex flex-col h-full border-amber-500/20 shadow-2xl">
                    <div class="p-4 bg-slate-900/80 border-b border-slate-800 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="file-json" class="text-amber-500 w-4 h-4"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">data.js সোর্স কোড</span>
                        </div>
                        <div class="flex gap-1.5">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500/30"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-amber-500/30"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500/30"></div>
                        </div>
                    </div>
                    <div class="flex-grow overflow-auto p-4 bg-[#010409] custom-scrollbar">
                        <pre id="code-display" class="code-font text-emerald-500/90"></pre>
                    </div>
                    <div class="p-3 bg-slate-900/50 border-t border-slate-800 text-center">
                        <p class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Auto-syncing with database variable</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const ADMIN_PASS = ".";
        let localData = [];
        let editIndex = -1;
        let activeSegment = 'কবিতা লিখন';

        // Load Initial Data
        function loadData() {
            const script = document.createElement('script');
            script.src = `https://meherpur-debating-forum.github.io/mdf-gds-iz-results/data.js?t=${Date.now()}`;
            script.onload = () => {
                if (typeof allParticipants !== 'undefined') {
                    localData = [...allParticipants];
                    updateDisplay();
                }
            };
            document.head.appendChild(script);
        }

        function checkAuth() {
            if(document.getElementById('password').value === ADMIN_PASS) {
                document.getElementById('auth-overlay').classList.add('hidden');
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        function saveItem() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const institute = document.getElementById('institute').value.trim();
            const segment = document.getElementById('segment').value;
            const mark = document.getElementById('mark').value.trim();
            const position = document.getElementById('position').value.trim();

            if(!name) return alert("দয়া করে নাম লিখুন!");

            const entry = { name, phone, institute, segment, mark, position };

            if(editIndex > -1) {
                localData[editIndex] = entry;
                cancelEdit();
            } else {
                localData.push(entry);
                resetFormFields();
            }
            updateDisplay();
        }

        function resetFormFields() {
            document.getElementById('name').value = "";
            document.getElementById('phone').value = "";
            document.getElementById('institute').value = "";
            document.getElementById('mark').value = "";
            document.getElementById('position').value = "";
        }

        function editItem(idx) {
            const item = localData[idx];
            document.getElementById('name').value = item.name;
            document.getElementById('phone').value = item.phone || "";
            document.getElementById('institute').value = item.institute || "";
            document.getElementById('segment').value = item.segment;
            document.getElementById('mark').value = item.mark || "";
            document.getElementById('position').value = item.position || "";

            editIndex = idx;
            document.getElementById('form-title').innerHTML = `<i data-lucide="user-cog" class="w-5 h-5"></i> ডাটা এডিট মোড`;
            document.getElementById('save-btn').innerText = "ডাটা আপডেট করুন";
            document.getElementById('save-btn').classList.replace('bg-white', 'bg-blue-600');
            document.getElementById('save-btn').classList.replace('text-slate-950', 'text-white');
            document.getElementById('cancel-btn').classList.remove('hidden');
            lucide.createIcons();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelEdit() {
            editIndex = -1;
            resetFormFields();
            document.getElementById('form-title').innerHTML = `<i data-lucide="user-plus" class="w-5 h-5"></i> প্রতিযোগী যোগ করুন`;
            document.getElementById('save-btn').innerText = "ডাটা সংরক্ষণ";
            document.getElementById('save-btn').className = "flex-[2] bg-white text-slate-950 font-bold py-3.5 rounded-2xl text-xs hover:bg-amber-500 transition shadow-lg";
            document.getElementById('cancel-btn').classList.add('hidden');
            lucide.createIcons();
        }

        function deleteItem(idx) {
            if(confirm("আপনি কি নিশ্চিতভাবে এই ডাটাটি মুছে ফেলতে চান?")) {
                localData.splice(idx, 1);
                updateDisplay();
            }
        }

        function changeFilter(seg) {
            activeSegment = seg;
            renderList();
        }

        function renderList() {
            const container = document.getElementById('list');
            const searchQuery = document.getElementById('globalSearch').value.toLowerCase();
            container.innerHTML = "";

            // Update Tab UI
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isMatch = btn.innerText.includes(activeSegment.substring(0,2));
                btn.className = `filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-[10px] font-bold transition ${isMatch ? 'bg-amber-500 text-slate-950' : 'text-slate-500 hover:text-white hover:bg-slate-900'}`;
            });

            // Filter by Segment and Search
            let results = localData.map((item, idx) => ({ ...item, originalIdx: idx }))
                                  .filter(r => r.segment === activeSegment);

            if(searchQuery) {
                results = results.filter(r => 
                    r.name.toLowerCase().includes(searchQuery) || 
                    (r.phone && r.phone.includes(searchQuery)) ||
                    (r.institute && r.institute.toLowerCase().includes(searchQuery))
                );
            }

            // Sort by Rank
            results.sort((a, b) => (parseInt(a.position) || 999) - (parseInt(b.position) || 999));

            if(results.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 text-xs">কোনো ফলাফল পাওয়া যায়নি</div>`;
                return;
            }

            results.forEach(res => {
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-4 bg-slate-900/40 rounded-2xl border ${editIndex === res.originalIdx ? 'border-amber-500 bg-amber-500/5' : 'border-slate-800/80'} hover:border-slate-600 transition-all duration-300`;
                
                // Rank Badge UI
                let rankBadge = '';
                if(res.position == '1') rankBadge = '<span class="bg-amber-500 text-black px-2.5 py-1 rounded-lg text-[10px] font-black shadow-lg shadow-amber-500/20">1ST</span>';
                else if(res.position == '2') rankBadge = '<span class="bg-slate-300 text-black px-2.5 py-1 rounded-lg text-[10px] font-black">2ND</span>';
                else if(res.position == '3') rankBadge = '<span class="bg-amber-800 text-white px-2.5 py-1 rounded-lg text-[10px] font-black">3RD</span>';
                else if(res.position) rankBadge = `<span class="bg-slate-800 text-slate-400 px-2.5 py-1 rounded-lg text-[10px] font-bold border border-slate-700">Rank: ${res.position}</span>`;

                div.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="flex items-center gap-2 mb-2">
                            ${rankBadge}
                            <h4 class="text-white font-bold text-sm truncate tracking-tight group-hover:text-amber-500 transition-colors">${res.name}</h4>
                        </div>
                        <div class="flex flex-wrap items-center gap-x-4 gap-y-1.5">
                            <div class="flex items-center gap-1.5 text-[10px] text-slate-500">
                                <i data-lucide="phone" class="w-3 h-3"></i> ${res.phone || 'N/A'}
                            </div>
                            <div class="flex items-center gap-1.5 text-[10px] text-slate-500">
                                <i data-lucide="graduation-cap" class="w-3 h-3"></i> ${res.institute || 'No Institute'}
                            </div>
                            <div class="flex items-center gap-1.5 text-[10px] font-bold text-amber-500 bg-amber-500/5 px-2 py-0.5 rounded-md border border-amber-500/10">
                                <i data-lucide="star" class="w-3 h-3"></i> মার্কস: ${res.mark || '0'}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="editItem(${res.originalIdx})" class="p-2.5 bg-blue-500/10 text-blue-400 rounded-xl hover:bg-blue-600 hover:text-white transition-all active:scale-90" title="এডিট">
                            <i data-lucide="edit" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteItem(${res.originalIdx})" class="p-2.5 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-600 hover:text-white transition-all active:scale-90" title="ডিলিট">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function updateDisplay() {
            renderList();
            const output = `const allParticipants = ${JSON.stringify(localData, null, 4)};`;
            document.getElementById('code-display').innerText = output;
        }

        function copyCode() {
            const text = document.getElementById('code-display').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('button[onclick="copyCode()"]');
                const oldContent = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> কপি হয়েছে!`;
                btn.classList.replace('bg-amber-500', 'bg-emerald-500');
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = oldContent;
                    btn.classList.replace('emerald-500', 'bg-amber-500');
                    lucide.createIcons();
                }, 2000);
            });
        }

        // Initialize
        window.onload = () => { loadData(); lucide.createIcons(); };
        document.getElementById('password').addEventListener('keypress', e => e.key === 'Enter' && checkAuth());
    </script>
</body>
</html>
